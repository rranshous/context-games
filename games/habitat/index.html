<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Habitat</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #0a0e17;
      color: #c8d0e0;
      font-family: 'Courier New', monospace;
      font-size: 14px;
      height: 100vh;
      overflow: hidden;
    }

    #app {
      display: flex;
      height: 100vh;
    }

    /* Left panel — games + chat */
    #left-panel {
      width: 320px;
      min-width: 280px;
      display: flex;
      flex-direction: column;
      border-right: 1px solid #1e2a3a;
    }
    #games-section {
      padding: 20px;
      border-bottom: 1px solid #1e2a3a;
      overflow-y: auto;
      flex-shrink: 0;
      max-height: 50%;
    }
    #chat-section {
      padding: 16px;
      flex: 1;
      display: flex;
      flex-direction: column;
      min-height: 0;
    }

    /* Center — canvas */
    #center-panel {
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 16px;
      border-right: 1px solid #1e2a3a;
    }
    #shared-canvas {
      border: 1px solid #1e2a3a;
      background: #0a0e17;
      padding: 8px;
      font-family: 'Courier New', monospace;
      font-size: 12px;
      line-height: 1.2;
      color: #8a9aaa;
      white-space: pre;
      margin: 0;
    }
    .canvas-label {
      font-size: 10px;
      text-transform: uppercase;
      letter-spacing: 1px;
      color: #5a7a9a;
      margin-bottom: 8px;
    }

    /* Soma panels — one per actant */
    .soma-panel {
      flex: 1;
      padding: 16px;
      overflow-y: auto;
      border-right: 1px solid #1e2a3a;
      background: #0d1220;
    }
    .soma-panel:last-child { border-right: none; }

    h2 {
      font-size: 13px;
      text-transform: uppercase;
      letter-spacing: 2px;
      color: #5a7a9a;
      margin-bottom: 16px;
    }

    /* Player handle input */
    .handle-input {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 16px;
    }
    .handle-input label {
      color: #5a7a9a;
      font-size: 11px;
      text-transform: uppercase;
    }
    .handle-input input {
      background: #141c2b;
      border: 1px solid #1e2a3a;
      color: #c8d0e0;
      font-family: inherit;
      font-size: 14px;
      padding: 4px 8px;
      width: 120px;
    }

    /* Buttons */
    button {
      background: #1a2535;
      border: 1px solid #2a3a4a;
      color: #8aa0b8;
      font-family: inherit;
      font-size: 12px;
      padding: 6px 14px;
      cursor: pointer;
      transition: background 0.15s;
    }
    button:hover { background: #243040; color: #c8d0e0; }
    button:disabled { opacity: 0.3; cursor: default; }

    /* Game list */
    .game-list { margin-bottom: 20px; }
    .game-item {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 8px 12px;
      margin-bottom: 4px;
      background: #111824;
      border: 1px solid #1a2535;
      cursor: pointer;
      transition: background 0.15s;
    }
    .game-item:hover { background: #182030; }
    .game-item.selected { border-color: #3a6a8a; }
    .game-status { font-size: 11px; text-transform: uppercase; }
    .game-status.waiting { color: #d4a040; }
    .game-status.active { color: #40b060; }
    .game-status.finished { color: #666; }

    /* Tic-tac-toe board */
    .board-container {
      display: flex;
      flex-direction: column;
      align-items: center;
      margin-top: 20px;
    }
    .board-info {
      font-size: 12px;
      color: #5a7a9a;
      margin-bottom: 12px;
      text-align: center;
    }
    .board {
      display: grid;
      grid-template-columns: repeat(3, 80px);
      grid-template-rows: repeat(3, 80px);
      gap: 4px;
    }
    .cell {
      background: #141c2b;
      border: 1px solid #1e2a3a;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 32px;
      font-weight: bold;
      cursor: pointer;
      transition: background 0.15s;
    }
    .cell:hover { background: #1a2535; }
    .cell.x { color: #60a0d0; }
    .cell.o { color: #d06060; }
    .cell.disabled { cursor: default; opacity: 0.6; }

    /* Chat */
    #chat-messages {
      flex: 1;
      overflow-y: auto;
      margin-bottom: 8px;
      min-height: 0;
    }
    .chat-msg {
      font-size: 11px;
      line-height: 1.5;
      padding: 2px 0;
    }
    .chat-time { color: #3a4a5a; }
    .chat-handle { color: #8ab8d8; font-weight: bold; }
    .chat-empty { color: #3a4a5a; font-style: italic; font-size: 11px; }
    .chat-input-row {
      display: flex;
      gap: 6px;
    }
    .chat-input-row input {
      flex: 1;
      background: #141c2b;
      border: 1px solid #1e2a3a;
      color: #c8d0e0;
      font-family: inherit;
      font-size: 12px;
      padding: 4px 8px;
    }

    /* Soma panel header */
    .soma-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 12px;
      padding-bottom: 8px;
      border-bottom: 1px solid #1e2a3a;
    }
    .soma-handle {
      font-size: 16px;
      font-weight: bold;
      color: #8ab8d8;
    }
    .soma-status {
      font-size: 11px;
      text-transform: uppercase;
      padding: 2px 8px;
    }
    .soma-status.idle { color: #5a7a9a; }
    .soma-status.thinking { color: #d4a040; }

    /* Soma sections */
    .soma-section {
      margin-bottom: 12px;
    }
    .soma-section-label {
      font-size: 10px;
      text-transform: uppercase;
      letter-spacing: 1px;
      color: #5a7a9a;
      margin-bottom: 4px;
    }
    .soma-section-content {
      color: #8a9aaa;
      font-size: 12px;
      white-space: pre-wrap;
      word-wrap: break-word;
      line-height: 1.5;
    }
    .soma-section-content.code {
      background: #0a0e17;
      border: 1px solid #1a2535;
      padding: 8px;
      font-size: 11px;
      line-height: 1.4;
    }
    .soma-section-content.empty {
      color: #3a4a5a;
      font-style: italic;
    }
    .soma-tool-item {
      background: #0a0e17;
      border: 1px solid #1a2535;
      padding: 6px 8px;
      margin-bottom: 4px;
    }
    .soma-tool-name {
      color: #8ab8d8;
      font-size: 11px;
      font-weight: bold;
    }
    .soma-tool-desc {
      color: #5a7a9a;
      font-size: 10px;
      margin-top: 2px;
    }

    .no-games { color: #3a4a5a; font-style: italic; font-size: 12px; }
  </style>
</head>
<body>
  <div id="app">
    <div id="left-panel">
      <div id="games-section">
        <h2>Games</h2>
        <div class="handle-input">
          <label>Handle:</label>
          <input type="text" id="player-handle" value="Player" />
          <button id="create-game-btn">Create Game</button>
          <button id="reset-btn" title="Reset somas, games, and all state">Reset</button>
        </div>
        <div id="game-list" class="game-list"></div>
        <div id="board-area"></div>
      </div>
      <div id="chat-section">
        <h2>Chat</h2>
        <div id="chat-messages"></div>
        <div class="chat-input-row">
          <input type="text" id="chat-input" placeholder="Say something..." />
          <button id="chat-send-btn">Send</button>
        </div>
      </div>
    </div>
    <div id="center-panel">
      <div class="canvas-label">Shared Canvas</div>
      <pre id="shared-canvas"></pre>
    </div>
    <div id="alpha-panel" class="soma-panel"></div>
    <div id="beta-panel" class="soma-panel"></div>
  </div>
  <script type="module" src="dist/main.js"></script>
</body>
</html>
