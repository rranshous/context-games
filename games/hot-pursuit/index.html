<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Hot Pursuit</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #0a0a0a;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      font-family: 'Courier New', monospace;
      color: #33ff33;
      overflow: hidden;
    }
    #game-wrapper {
      display: flex;
      gap: 0;
      align-items: flex-start;
    }
    #game-container {
      position: relative;
      flex-shrink: 0;
    }
    canvas {
      display: block;
      image-rendering: pixelated;
      border: 2px solid #1a3a1a;
      width: 960px;
      height: 720px;
    }
    #hud {
      position: absolute;
      top: -28px;
      left: 0;
      right: 0;
      display: flex;
      justify-content: space-between;
      font-size: 14px;
      padding: 4px 8px;
    }
    #hud .status { color: #33ff33; }
    #hud .timer { color: #ffaa33; }
    #game-over-overlay {
      display: none;
      position: absolute;
      inset: 0;
      background: rgba(0, 0, 0, 0.8);
      justify-content: center;
      align-items: center;
      flex-direction: column;
      gap: 16px;
      font-size: 24px;
    }
    #game-over-overlay.visible { display: flex; }
    #game-over-overlay .result { font-size: 32px; font-weight: bold; }
    #game-over-overlay .escaped { color: #33ff33; }
    #game-over-overlay .captured { color: #ff3333; }
    #game-over-overlay .prompt {
      font-size: 16px;
      color: #888;
      animation: blink 1.2s infinite;
    }
    @keyframes blink {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.3; }
    }

    /* ── Reset Button ── */
    #reset-btn {
      position: absolute;
      top: -28px;
      right: 0;
      background: transparent;
      border: 1px solid #333;
      color: #666;
      font-family: 'Courier New', monospace;
      font-size: 10px;
      padding: 2px 6px;
      cursor: pointer;
      z-index: 10;
    }
    #reset-btn:hover { color: #ff3333; border-color: #ff3333; }

    /* ── Reflection Overlay (unified live view) ── */
    #reflection-overlay {
      display: none;
      position: absolute;
      inset: 0;
      background: rgba(0, 0, 0, 0.92);
      overflow-y: auto;
      padding: 16px;
    }
    #reflection-overlay.visible { display: block; }
    #reflection-content {
      max-width: 900px;
      width: 100%;
      margin: 0 auto;
    }
    .reflection-title {
      font-size: 22px;
      font-weight: bold;
      color: #ffaa33;
      text-align: center;
      margin-bottom: 12px;
    }
    .reflection-subtitle {
      font-size: 14px;
      color: #888;
      text-align: center;
      margin-bottom: 20px;
    }

    /* ── Unified officer cards ── */
    .reflection-card-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
      margin: 8px 0;
    }
    .reflection-card {
      background: #111;
      border: 1px solid #222;
      border-left: 3px solid #ffaa33;
      padding: 8px;
    }
    .reflection-card.done { border-color: #33ff33; border-left-color: #33ff33; }
    .reflection-card.error { border-color: #ff3333; border-left-color: #ff3333; }
    .reflection-card-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 6px;
    }
    .reflection-card-label {
      color: #ffaa33;
      font-size: 13px;
      font-weight: bold;
    }
    .reflection-card-status {
      font-size: 11px;
    }
    .reflection-card-status.active { color: #ffaa33; }
    .reflection-card-status.done { color: #33ff33; }
    .reflection-card-status.error { color: #ff3333; }
    .inspect-btn {
      background: transparent;
      border: 1px solid #444;
      color: #888;
      font-family: 'Courier New', monospace;
      font-size: 9px;
      padding: 1px 6px;
      cursor: pointer;
      margin-left: 6px;
    }
    .inspect-btn:hover { color: #ffaa33; border-color: #ffaa33; }
    .inspect-btn.active { color: #ffaa33; border-color: #ffaa33; }
    .reflection-card-map {}
    .reflection-card-map img {
      image-rendering: pixelated;
      width: 100%;
      max-height: 200px;
      object-fit: contain;
      border: 1px solid #333;
      display: block;
    }
    .reflection-card-content {
      margin-top: 6px;
      max-height: 300px;
      overflow-y: auto;
    }

    /* ── Haiku summary (replaces verbose reasoning) ── */
    .reflection-summary {
      color: #ccc;
      font-size: 12px;
      line-height: 1.5;
      padding: 6px 0;
      border-bottom: 1px solid #222;
    }
    .reflection-summary p { margin: 2px 0; }
    .reflection-summary li { margin: 1px 0; }
    .reflection-summary ul { padding-left: 14px; margin: 2px 0; }
    .reflection-summary strong { color: #fff; }

    /* ── Debrief sharing summary ── */
    .reflection-debrief-summary {
      color: #99ccff;
      font-size: 12px;
      line-height: 1.5;
      padding: 6px 0;
      border-top: 1px solid #224;
      margin-top: 4px;
    }
    .reflection-debrief-summary p { margin: 2px 0; }
    .reflection-debrief-summary li { margin: 1px 0; }
    .reflection-debrief-summary ul { padding-left: 14px; margin: 2px 0; }
    .debrief-label {
      font-size: 9px;
      text-transform: uppercase;
      letter-spacing: 1px;
      color: #5588aa;
      margin-bottom: 2px;
    }

    /* ── Collapsible full reasoning ── */
    .reflection-full-reasoning { margin-top: 6px; }
    .reflection-full-reasoning summary {
      color: #555;
      font-size: 10px;
      cursor: pointer;
      user-select: none;
    }
    .reflection-full-reasoning summary:hover { color: #888; }
    .reflection-reasoning-content {
      color: #777;
      font-size: 11px;
      line-height: 1.3;
      padding: 6px;
      background: #0a0a0a;
      border: 1px solid #1a1a1a;
      max-height: 200px;
      overflow-y: auto;
      margin-top: 4px;
    }
    .reflection-reasoning-content p { margin: 3px 0; }
    .reflection-reasoning-content strong { color: #aaa; }
    .reflection-reasoning-content em { color: #888; }
    .reflection-reasoning-content ul { padding-left: 14px; margin: 2px 0; }
    .reflection-reasoning-content li { margin: 1px 0; }
    .reflection-reasoning-content code {
      background: #1a1a2e;
      padding: 1px 3px;
      font-size: 10px;
      color: #88aaff;
    }

    /* ── Tool call badges ── */
    .reflection-tool-badge {
      font-size: 11px;
      padding: 4px 8px;
      margin: 4px 0;
      border-left: 3px solid #555;
      background: #0d0d0d;
    }
    .reflection-tool-badge .badge-icon { margin-right: 4px; }
    .reflection-tool-badge.badge-handlers { border-left-color: #33ff33; color: #33ff33; }
    .reflection-tool-badge.badge-memory { border-left-color: #5599ff; color: #5599ff; }
    .reflection-tool-badge.badge-tools { border-left-color: #ffaa33; color: #ffaa33; }
    .reflection-tool-badge.badge-discover { border-left-color: #888; color: #888; }
    .reflection-tool-badge.badge-replay { border-left-color: #888; color: #888; }
    .reflection-tool-badge.failed { border-left-color: #ff3333; color: #ff3333; }

    /* ── Collapsible details (shared for code/memory) ── */
    .reflection-tool-details { margin-top: 4px; }
    .reflection-tool-details summary {
      color: #666;
      font-size: 10px;
      cursor: pointer;
      user-select: none;
    }
    .reflection-tool-details summary:hover { color: #888; }
    .strategy-code {
      background: #0d0d1a;
      color: #88aaff;
      font-family: 'Courier New', monospace;
      font-size: 10px;
      padding: 6px;
      overflow-x: auto;
      white-space: pre;
      margin: 4px 0;
      border: 1px solid #222;
      max-height: 200px;
      overflow-y: auto;
    }
    .strategy-memory {
      color: #aaa;
      font-size: 11px;
      padding: 6px;
      background: #0d0d0d;
      white-space: pre-wrap;
      border: 1px solid #222;
      max-height: 150px;
      overflow-y: auto;
    }

    .reflection-prompt {
      text-align: center;
      font-size: 16px;
      color: #888;
      margin-top: 16px;
      padding-bottom: 8px;
      animation: blink 1.2s infinite;
    }
    .reflection-error {
      color: #ff3333;
      font-size: 13px;
      text-align: center;
      margin: 12px 0;
      padding: 8px;
      background: #1a0000;
      border: 1px solid #330000;
    }

    /* ── Soma Inspector Panel ── */
    #soma-panel {
      width: 340px;
      height: 720px;
      overflow-y: auto;
      background: #0d0d0d;
      border: 1px solid #1a1a1a;
      border-left: none;
      margin-top: 28px; /* align with canvas (below HUD) */
      scrollbar-width: thin;
      scrollbar-color: #333 #0d0d0d;
    }
    .soma-panel-title {
      font-size: 11px;
      font-weight: bold;
      color: #555;
      text-transform: uppercase;
      letter-spacing: 2px;
      padding: 10px 12px 6px;
      border-bottom: 1px solid #1a1a1a;
    }
    .soma-card {
      border-bottom: 1px solid #1a1a1a;
      padding: 10px 12px;
    }
    .soma-card-header {
      display: flex;
      justify-content: space-between;
      align-items: baseline;
      margin-bottom: 6px;
    }
    .soma-card-name {
      color: #ffaa33;
      font-size: 13px;
      font-weight: bold;
    }
    .soma-card-badge {
      color: #444;
      font-size: 10px;
    }
    .soma-card-nature {
      color: #555;
      font-size: 10px;
      font-style: italic;
      margin-bottom: 8px;
      line-height: 1.3;
    }
    .soma-card-section {
      margin-bottom: 6px;
    }
    .soma-card-section-label {
      font-size: 9px;
      text-transform: uppercase;
      letter-spacing: 1px;
      color: #444;
      margin-bottom: 3px;
    }
    .soma-card-behavior {
      color: #ccc;
      font-size: 11px;
      line-height: 1.4;
    }
    .soma-card-behavior li {
      margin: 2px 0;
      list-style: none;
      padding-left: 10px;
      position: relative;
    }
    .soma-card-behavior li::before {
      content: '·';
      position: absolute;
      left: 2px;
      color: #555;
    }
    .soma-card-behavior ul { padding: 0; margin: 0; }
    .soma-card-memory {
      color: #88aacc;
      font-size: 10px;
      line-height: 1.3;
      max-height: 150px;
      overflow-y: auto;
      white-space: pre-wrap;
      padding: 4px 6px;
      background: #0a0a12;
      border: 1px solid #151520;
    }
    .soma-card details {
      margin-top: 4px;
    }
    .soma-card details summary {
      color: #444;
      font-size: 9px;
      cursor: pointer;
      user-select: none;
    }
    .soma-card details summary:hover { color: #666; }
    .soma-card-code {
      font-family: 'Courier New', monospace;
      font-size: 9px;
      color: #6688aa;
      background: #0a0a12;
      border: 1px solid #151520;
      padding: 4px 6px;
      white-space: pre;
      overflow-x: auto;
      max-height: 300px;
      overflow-y: auto;
      margin-top: 4px;
    }
    .soma-card-generating {
      color: #555;
      font-size: 10px;
      font-style: italic;
    }
  </style>
</head>
<body>
  <div id="game-wrapper">
    <div id="game-container">
      <div id="hud">
        <span class="status" id="hud-status">RUN: 1</span>
        <span class="timer" id="hud-timer">TIME: 0</span>
      </div>
      <button id="reset-btn">RESET</button>
      <canvas id="game-canvas"></canvas>
      <div id="game-over-overlay">
        <div class="result" id="result-text"></div>
        <div class="prompt">PRESS SPACE FOR DEBRIEF</div>
      </div>
      <div id="reflection-overlay">
        <div id="reflection-content"></div>
      </div>
    </div>
    <div id="soma-panel">
      <div class="soma-panel-title">Officers</div>
    </div>
  </div>
  <div id="build-tag" style="position:fixed;bottom:4px;right:6px;font:10px monospace;color:#ffaa33;background:#000;padding:1px 4px;z-index:9999"></div>
  <script type="module" src="main.js"></script>
  <script>document.getElementById('build-tag').textContent = 'b.' + String(Date.now()).slice(-6);</script>
</body>
</html>
