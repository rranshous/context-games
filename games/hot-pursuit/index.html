<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Hot Pursuit</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #0a0a0a;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      font-family: 'Courier New', monospace;
      color: #33ff33;
      overflow: hidden;
    }
    #game-container {
      position: relative;
    }
    canvas {
      display: block;
      image-rendering: pixelated;
      border: 2px solid #1a3a1a;
    }
    #hud {
      position: absolute;
      top: -28px;
      left: 0;
      right: 0;
      display: flex;
      justify-content: space-between;
      font-size: 14px;
      padding: 4px 8px;
    }
    #hud .status { color: #33ff33; }
    #hud .timer { color: #ffaa33; }
    #game-over-overlay {
      display: none;
      position: absolute;
      inset: 0;
      background: rgba(0, 0, 0, 0.8);
      justify-content: center;
      align-items: center;
      flex-direction: column;
      gap: 16px;
      font-size: 24px;
    }
    #game-over-overlay.visible { display: flex; }
    #game-over-overlay .result { font-size: 32px; font-weight: bold; }
    #game-over-overlay .escaped { color: #33ff33; }
    #game-over-overlay .captured { color: #ff3333; }
    #game-over-overlay .prompt {
      font-size: 16px;
      color: #888;
      animation: blink 1.2s infinite;
    }
    @keyframes blink {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.3; }
    }

    /* ── Reflection Overlay ── */
    #reflection-overlay {
      display: none;
      position: absolute;
      inset: 0;
      background: rgba(0, 0, 0, 0.92);
      justify-content: center;
      align-items: flex-start;
      flex-direction: column;
      overflow-y: auto;
      padding: 24px;
    }
    #reflection-overlay.visible { display: flex; }
    #reflection-content {
      max-width: 900px;
      width: 100%;
      margin: 0 auto;
    }
    .reflection-title {
      font-size: 28px;
      font-weight: bold;
      color: #ffaa33;
      text-align: center;
      margin-bottom: 8px;
    }
    .reflection-subtitle {
      font-size: 14px;
      color: #888;
      text-align: center;
      margin-bottom: 20px;
    }
    .reflection-officer {
      display: flex;
      justify-content: space-between;
      padding: 6px 12px;
      margin: 4px 0;
      background: #111;
      border-left: 3px solid #333;
    }
    .officer-name { color: #aaa; }
    .officer-status.active { color: #ffaa33; }
    .officer-status.done { color: #33ff33; }
    .officer-status.error { color: #ff3333; }
    .strategy-officers {
      display: flex;
      flex-direction: column;
      gap: 16px;
      margin: 16px 0;
    }
    .strategy-officer {
      background: #111;
      border: 1px solid #222;
      padding: 16px;
      border-left: 3px solid #ffaa33;
    }
    .strategy-name {
      color: #ffaa33;
      font-weight: bold;
      font-size: 16px;
      margin-bottom: 4px;
    }
    .strategy-nature {
      color: #666;
      font-size: 12px;
      font-style: italic;
      margin-bottom: 10px;
    }
    .strategy-changes { margin-bottom: 10px; }
    .strategy-change { color: #33ff33; font-size: 13px; padding: 2px 0; }
    .strategy-no-update { color: #555; font-size: 13px; }
    .strategy-reasoning {
      color: #ccc;
      font-size: 13px;
      line-height: 1.5;
      margin-top: 8px;
      padding: 8px 12px;
      background: #0a0a0a;
      border-left: 2px solid #333;
    }
    .strategy-reasoning h2 { color: #ffaa33; font-size: 16px; margin: 12px 0 6px; }
    .strategy-reasoning h3 { color: #ffaa33; font-size: 14px; margin: 10px 0 4px; }
    .strategy-reasoning h4 { color: #ddd; font-size: 13px; margin: 8px 0 4px; }
    .strategy-reasoning strong { color: #fff; }
    .strategy-reasoning em { color: #aaa; }
    .strategy-reasoning ul { padding-left: 16px; margin: 4px 0; }
    .strategy-reasoning li { margin: 2px 0; }
    .strategy-reasoning code {
      background: #1a1a2e;
      padding: 1px 4px;
      font-size: 12px;
      color: #88aaff;
    }
    .strategy-reasoning p { margin: 6px 0; }
    .strategy-code {
      background: #0d0d1a;
      color: #88aaff;
      font-family: 'Courier New', monospace;
      font-size: 11px;
      padding: 10px;
      overflow-x: auto;
      white-space: pre;
      margin: 6px 0;
      border: 1px solid #222;
      max-height: 300px;
      overflow-y: auto;
    }
    .strategy-memory {
      color: #aaa;
      font-size: 12px;
      padding: 8px;
      background: #0d0d0d;
      white-space: pre-wrap;
      border: 1px solid #222;
      max-height: 200px;
      overflow-y: auto;
    }
    .reflection-map-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
      margin: 12px 0;
    }
    .reflection-map-card {
      background: #111;
      border: 1px solid #222;
      padding: 8px;
      text-align: center;
    }
    .reflection-map-card.done { border-color: #33ff33; }
    .reflection-map-card.error { border-color: #ff3333; }
    .reflection-map-card img {
      image-rendering: pixelated;
      width: 100%;
      aspect-ratio: 4/3;
      border: 1px solid #333;
      display: block;
    }
    .reflection-map-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 4px;
    }
    .reflection-map-label {
      color: #aaa;
      font-size: 12px;
      font-weight: bold;
    }
    .reflection-map-status {
      font-size: 11px;
    }
    .reflection-map-status.active { color: #ffaa33; }
    .reflection-map-status.done { color: #33ff33; }
    .reflection-map-status.error { color: #ff3333; }
    .strategy-details {
      margin-top: 8px;
    }
    .strategy-details summary {
      color: #888;
      font-size: 12px;
      cursor: pointer;
      user-select: none;
    }
    .strategy-details summary:hover { color: #aaa; }
    .strategy-tools { color: #555; font-size: 11px; margin-top: 8px; }
    .reflection-prompt {
      text-align: center;
      font-size: 16px;
      color: #888;
      margin-top: 20px;
      animation: blink 1.2s infinite;
    }
    .reflection-error {
      color: #ff3333;
      font-size: 13px;
      text-align: center;
      margin: 12px 0;
      padding: 8px;
      background: #1a0000;
      border: 1px solid #330000;
    }
  </style>
</head>
<body>
  <div id="game-container">
    <div id="hud">
      <span class="status" id="hud-status">RUN: 1</span>
      <span class="timer" id="hud-timer">TIME: 0</span>
    </div>
    <canvas id="game-canvas"></canvas>
    <div id="game-over-overlay">
      <div class="result" id="result-text"></div>
      <div class="prompt">PRESS SPACE FOR DEBRIEF</div>
    </div>
    <div id="reflection-overlay">
      <div id="reflection-content"></div>
    </div>
  </div>
  <div id="build-tag" style="position:fixed;bottom:4px;right:6px;font:10px monospace;color:#ffaa33;background:#000;padding:1px 4px;z-index:9999"></div>
  <script type="module" src="main.js"></script>
  <script>document.getElementById('build-tag').textContent = 'b.' + String(Date.now()).slice(-6);</script>
</body>
</html>
