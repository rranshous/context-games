<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Hot Pursuit</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #0a0a0a;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      font-family: 'Courier New', monospace;
      color: #33ff33;
      overflow: hidden;
    }
    #game-container {
      position: relative;
    }
    canvas {
      display: block;
      image-rendering: pixelated;
      border: 2px solid #1a3a1a;
    }
    #hud {
      position: absolute;
      top: -28px;
      left: 0;
      right: 0;
      display: flex;
      justify-content: space-between;
      font-size: 14px;
      padding: 4px 8px;
    }
    #hud .status { color: #33ff33; }
    #hud .timer { color: #ffaa33; }
    #game-over-overlay {
      display: none;
      position: absolute;
      inset: 0;
      background: rgba(0, 0, 0, 0.8);
      justify-content: center;
      align-items: center;
      flex-direction: column;
      gap: 16px;
      font-size: 24px;
    }
    #game-over-overlay.visible { display: flex; }
    #game-over-overlay .result { font-size: 32px; font-weight: bold; }
    #game-over-overlay .escaped { color: #33ff33; }
    #game-over-overlay .captured { color: #ff3333; }
    #game-over-overlay .prompt {
      font-size: 16px;
      color: #888;
      animation: blink 1.2s infinite;
    }
    @keyframes blink {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.3; }
    }

    /* ── Reflection Overlay ── */
    #reflection-overlay {
      display: none;
      position: absolute;
      inset: 0;
      background: rgba(0, 0, 0, 0.92);
      justify-content: center;
      align-items: center;
      flex-direction: column;
      overflow-y: auto;
      padding: 24px;
    }
    #reflection-overlay.visible { display: flex; }
    #reflection-content {
      max-width: 560px;
      width: 100%;
    }
    .reflection-title {
      font-size: 28px;
      font-weight: bold;
      color: #ffaa33;
      text-align: center;
      margin-bottom: 8px;
    }
    .reflection-subtitle {
      font-size: 14px;
      color: #888;
      text-align: center;
      margin-bottom: 20px;
    }
    .reflection-officer {
      display: flex;
      justify-content: space-between;
      padding: 6px 12px;
      margin: 4px 0;
      background: #111;
      border-left: 3px solid #333;
    }
    .officer-name { color: #aaa; }
    .officer-status.active { color: #ffaa33; }
    .officer-status.done { color: #33ff33; }
    .officer-status.error { color: #ff3333; }
    .strategy-officers {
      display: flex;
      flex-direction: column;
      gap: 12px;
      margin: 16px 0;
    }
    .strategy-officer {
      background: #111;
      border: 1px solid #222;
      padding: 12px;
      border-left: 3px solid #ffaa33;
    }
    .strategy-name {
      color: #ffaa33;
      font-weight: bold;
      font-size: 16px;
      margin-bottom: 4px;
    }
    .strategy-nature {
      color: #666;
      font-size: 11px;
      font-style: italic;
      margin-bottom: 8px;
    }
    .strategy-update { color: #33ff33; font-size: 13px; }
    .strategy-no-update { color: #555; font-size: 13px; }
    .strategy-reasoning {
      color: #aaa;
      font-size: 12px;
      margin-top: 6px;
      padding-left: 8px;
      border-left: 2px solid #333;
    }
    .strategy-tools { color: #555; font-size: 11px; margin-top: 4px; }
    .reflection-prompt {
      text-align: center;
      font-size: 16px;
      color: #888;
      margin-top: 20px;
      animation: blink 1.2s infinite;
    }
    .reflection-error {
      color: #ff3333;
      font-size: 13px;
      text-align: center;
      margin: 12px 0;
      padding: 8px;
      background: #1a0000;
      border: 1px solid #330000;
    }
  </style>
</head>
<body>
  <div id="game-container">
    <div id="hud">
      <span class="status" id="hud-status">RUN: 1</span>
      <span class="timer" id="hud-timer">TIME: 0</span>
    </div>
    <canvas id="game-canvas"></canvas>
    <div id="game-over-overlay">
      <div class="result" id="result-text"></div>
      <div class="prompt">PRESS SPACE FOR DEBRIEF</div>
    </div>
    <div id="reflection-overlay">
      <div id="reflection-content"></div>
    </div>
  </div>
  <script type="module" src="/src/main.ts"></script>
</body>
</html>
