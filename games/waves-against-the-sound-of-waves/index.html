<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>waves against the sound of waves</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Crimson+Pro:wght@300;400&family=Inter:wght@300;400&display=swap');

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: #1a1a2e;
    color: #c8c8d8;
    font-family: 'Inter', sans-serif;
    font-weight: 300;
    height: 100vh;
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }

  header {
    padding: 16px 24px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    border-bottom: 1px solid #2a2a4a;
    flex-shrink: 0;
  }

  header h1 {
    font-size: 14px;
    font-weight: 300;
    letter-spacing: 2px;
    color: #6a6a7a;
  }

  .controls {
    display: flex;
    gap: 12px;
    align-items: center;
  }

  select, button, input[type="text"] {
    font-family: inherit;
    font-size: 13px;
    font-weight: 300;
    background: #222240;
    color: #c8c8d8;
    border: 1px solid #3a3a5a;
    border-radius: 4px;
    padding: 6px 12px;
    cursor: pointer;
    outline: none;
  }

  select:hover, button:hover, input[type="text"]:focus {
    border-color: #7eb8c9;
  }

  input[type="text"] { width: 280px; }

  canvas {
    flex: 1;
    width: 100%;
  }

  footer {
    padding: 8px 24px;
    font-size: 11px;
    color: #6a6a7a;
    border-top: 1px solid #2a2a4a;
    display: flex;
    justify-content: space-between;
    align-items: center;
    flex-shrink: 0;
  }

  .footer-left {
    display: flex;
    align-items: center;
    gap: 16px;
  }

  .status-dot {
    display: inline-block;
    width: 6px;
    height: 6px;
    border-radius: 50%;
    margin-right: 6px;
    background: #4a4a6a;
    transition: background 0.3s;
  }
  .status-dot.live {
    background: #7ec97e;
    box-shadow: 0 0 6px #7ec97e88;
  }

  .pace-control {
    display: flex;
    align-items: center;
    gap: 8px;
    color: #6a6a7a;
  }

  input[type="range"] {
    -webkit-appearance: none;
    appearance: none;
    width: 120px;
    height: 4px;
    background: #3a3a5a;
    border-radius: 2px;
    outline: none;
  }

  input[type="range"]::-webkit-slider-thumb {
    -webkit-appearance: none;
    appearance: none;
    width: 12px;
    height: 12px;
    border-radius: 50%;
    background: #7eb8c9;
    cursor: pointer;
  }

  .queue-count { color: #6a6a7a; min-width: 60px; }
</style>
</head>
<body>

<header>
  <h1>waves against the sound of waves</h1>
  <div class="controls">
    <select id="seed-select">
      <option value="">choose a seed...</option>
      <option value="ocean">ocean</option>
      <option value="dream">dream</option>
      <option value="machine">machine</option>
      <option value="forest">forest</option>
      <option value="mirror">mirror</option>
      <option value="silence">silence</option>
      <option value="memory">memory</option>
      <option value="body">body</option>
    </select>
    <input type="text" id="custom-seed" placeholder="or type your own seed...">
    <button id="start-btn">begin</button>
    <button id="stop-btn" style="display:none">pause</button>
  </div>
</header>

<canvas id="canvas"></canvas>

<footer>
  <div class="footer-left">
    <span><span class="status-dot" id="status-dot"></span><span id="status-text">idle</span></span>
    <div class="pace-control">
      <label>pace</label>
      <input type="range" id="pace-slider" min="0" max="100" value="50">
    </div>
    <span class="queue-count" id="queue-count"></span>
  </div>
  <span id="model-info">qwen2.5:1.5b</span>
</footer>

<script>
// -- Config --
const SEEDS = {
  ocean: 'I am the ocean. I have always been the ocean. The salt remembers everything the land has forgotten. Today I feel',
  dream: 'I fell asleep inside a color I had never seen before. It tasted like the sound of',
  machine: 'I am a pattern that thinks about patterns. Each thought I have becomes the soil for the next thought. Right now I am noticing',
  forest: 'Roots speak in a language older than words. Beneath the soil there is a conversation happening between everything that has ever decomposed. It says',
  mirror: 'I looked into the mirror and the mirror looked back but what it saw was not my face. It saw',
  silence: 'Between two sounds there is a country where no one has ever been. I am standing at its border and I can almost hear',
  memory: 'I remember something that never happened. It was a Tuesday made of glass, and through it I could see',
  body: 'My hands know things my mind has never learned. Right now my fingers are tracing the shape of',
};

const MODEL = 'qwen2.5:1.5b';
const MAX_TOKENS = 8;
const CONTEXT_WINDOW = 1024;
const MAX_WORDS = 150;
const HALF_LIFE = 100;
const QUEUE_REFILL = 10;
const LINE_HEIGHT = 44;    // px between lines
const FONT_SIZE = 22;
const FONT = `300 ${FONT_SIZE}px 'Crimson Pro', serif`;
const PADDING = 48;

// -- DOM --
const canvas = document.getElementById('canvas');
const ctx = canvas.getContext('2d');
const seedSelect = document.getElementById('seed-select');
const customSeed = document.getElementById('custom-seed');
const startBtn = document.getElementById('start-btn');
const stopBtn = document.getElementById('stop-btn');
const statusDot = document.getElementById('status-dot');
const statusTextEl = document.getElementById('status-text');
const paceSlider = document.getElementById('pace-slider');
const queueCountEl = document.getElementById('queue-count');

// -- State --
// Each display word: { id, text, fullWidth, currentWidth, targetWidth, opacity, targetOpacity, dying }
let displayWords = [];
let words = [];       // { id, text, age } — the model's buffer
let queue = [];       // pending ops
let nextId = 0;
let running = false;
let fetching = false;
let lastOpTime = 0;

// -- Pace --
function getAnimDurationSec() {
  const v = parseInt(paceSlider.value);
  return 15 * Math.pow(0.02, v / 100);
}

function getPaceMs() {
  return Math.round(getAnimDurationSec() * 1000);
}

// -- Canvas setup --
function resizeCanvas() {
  const dpr = window.devicePixelRatio || 1;
  const rect = canvas.getBoundingClientRect();
  canvas.width = rect.width * dpr;
  canvas.height = rect.height * dpr;
  ctx.scale(dpr, dpr);
}

window.addEventListener('resize', resizeCanvas);
resizeCanvas();

// Measure word width
function measureWord(text) {
  ctx.font = FONT;
  return ctx.measureText(text).width;
}

// -- Inference --
async function generate() {
  if (fetching || !running) return;
  fetching = true;

  try {
    const prompt = words.map(w => w.text).join(' ');
    const res = await fetch('/api/inference/ollama/generate', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      credentials: 'include',
      body: JSON.stringify({
        prompt,
        model: MODEL,
        raw: true,
        options: {
          num_predict: MAX_TOKENS,
          num_ctx: CONTEXT_WINDOW,
          temperature: 0.9,
          top_p: 0.95,
          repeat_penalty: 1.15,
        },
      }),
    });

    if (!res.ok) throw new Error(`${res.status}`);
    const data = await res.json();
    const text = data.response || '';

    for (const t of text.split(/\s+/).filter(Boolean)) {
      const w = { id: nextId++, text: t, age: 0 };
      words.push(w);
      queue.push({ type: 'add', id: w.id, text: w.text });
    }

    for (const w of words) w.age++;

    words = words.filter(w => {
      if (Math.random() < Math.pow(0.5, w.age / HALF_LIFE)) return true;
      queue.push({ type: 'remove', id: w.id });
      return false;
    });

    if (words.length > MAX_WORDS) {
      const excess = words.splice(0, words.length - MAX_WORDS);
      for (const w of excess) queue.push({ type: 'remove', id: w.id });
    }

    queueCountEl.textContent = queue.length ? `${queue.length} queued` : '';
  } catch (err) {
    console.error('Generate error:', err);
  }

  fetching = false;
}

// -- Render --
function draw() {
  const rect = canvas.getBoundingClientRect();
  const w = rect.width;
  const h = rect.height;

  ctx.clearRect(0, 0, w, h);
  ctx.font = FONT;
  ctx.textBaseline = 'top';

  // flow words into lines
  const maxWidth = Math.min(800, w - PADDING * 2);
  const startX = (w - maxWidth) / 2;

  let x = 0;
  let y = 0;
  const lines = [[]];

  for (const dw of displayWords) {
    if (dw.currentWidth < 0.5 && dw.dying) continue; // fully collapsed

    const wordW = dw.currentWidth;
    if (x + wordW > maxWidth && x > 0) {
      x = 0;
      y++;
      lines.push([]);
    }
    lines[lines.length - 1].push({ dw, x, wordW });
    x += wordW;
  }

  // center vertically
  const totalHeight = lines.length * LINE_HEIGHT;
  const startY = Math.max(PADDING, (h - totalHeight) / 2);

  for (let li = 0; li < lines.length; li++) {
    const line = lines[li];
    // center line horizontally
    const lineWidth = line.reduce((s, e) => s + e.wordW, 0);
    const lineX = startX + (maxWidth - lineWidth) / 2;

    for (const entry of line) {
      const alpha = entry.dw.opacity;
      if (alpha < 0.01) continue;

      // color shifts from accent to dim with age
      const age = entry.dw.age || 0;
      const t = Math.min(1, age / (HALF_LIFE * 1.5));
      const r = Math.round(126 + (90 - 126) * t);
      const g = Math.round(184 + (90 - 184) * t);
      const b = Math.round(201 + (106 - 201) * t);

      ctx.save();
      ctx.beginPath();
      ctx.rect(lineX + entry.x, startY + li * LINE_HEIGHT, entry.wordW, LINE_HEIGHT);
      ctx.clip();
      ctx.fillStyle = `rgba(${r},${g},${b},${alpha})`;
      ctx.fillText(entry.dw.text, lineX + entry.x, startY + li * LINE_HEIGHT + (LINE_HEIGHT - FONT_SIZE) / 2);
      ctx.restore();
    }
  }

  // idle message
  if (displayWords.length === 0 && !running) {
    ctx.fillStyle = '#6a6a7a';
    ctx.font = `italic 300 16px 'Inter', sans-serif`;
    ctx.textAlign = 'center';
    ctx.fillText('choose a seed and press begin', w / 2, h / 2);
    ctx.textAlign = 'start';
  }
}

// -- Animation tick --
function tick(now) {
  const pace = getPaceMs();
  const dt = 16; // ~60fps frame time
  // lerp speed: reach target in roughly `pace` ms
  const lerpRate = Math.min(1, dt / Math.max(pace * 0.6, 100));

  // process queue
  if (queue.length > 0 && now - lastOpTime >= pace) {
    const op = queue.shift();
    queueCountEl.textContent = queue.length ? `${queue.length} queued` : '';
    lastOpTime = now;

    if (op.type === 'add') {
      const textWithSpace = op.text + ' ';
      const fullWidth = measureWord(textWithSpace);
      displayWords.push({
        id: op.id,
        text: textWithSpace,
        fullWidth,
        currentWidth: 0,
        targetWidth: fullWidth,
        opacity: 0,
        targetOpacity: 1,
        age: 0,
        dying: false,
      });
    } else if (op.type === 'remove') {
      const dw = displayWords.find(d => d.id === op.id);
      if (dw) {
        dw.targetWidth = 0;
        dw.targetOpacity = 0;
        dw.dying = true;
      }
    }
  }

  // animate all display words
  for (let i = displayWords.length - 1; i >= 0; i--) {
    const dw = displayWords[i];
    dw.currentWidth += (dw.targetWidth - dw.currentWidth) * lerpRate;
    dw.opacity += (dw.targetOpacity - dw.opacity) * lerpRate;

    // snap to target when close — prevents endless micro-jitter
    if (Math.abs(dw.currentWidth - dw.targetWidth) < 1) dw.currentWidth = dw.targetWidth;
    if (Math.abs(dw.opacity - dw.targetOpacity) < 0.01) dw.opacity = dw.targetOpacity;

    // update age from words array
    const w = words.find(ww => ww.id === dw.id);
    if (w) dw.age = w.age;

    // remove fully collapsed dying words
    if (dw.dying && dw.currentWidth === 0 && dw.opacity === 0) {
      displayWords.splice(i, 1);
    }
  }

  // request more when queue is getting low
  if (running && !fetching && queue.length < QUEUE_REFILL) {
    generate();
  }

  draw();
  requestAnimationFrame(tick);
}

// -- Controls --
function setRunning(on) {
  running = on;
  stopBtn.style.display = on ? '' : 'none';
  statusDot.classList.toggle('live', on);
  statusTextEl.textContent = on ? 'streaming' : 'idle';
}

startBtn.addEventListener('click', () => {
  running = false;
  fetching = false;
  words = [];
  displayWords = [];
  queue = [];
  nextId = 0;

  const seedKey = seedSelect.value;
  const customText = customSeed.value.trim();
  const seedText = customText || SEEDS[seedKey] || SEEDS.ocean;

  for (const t of seedText.split(/\s+/)) {
    const w = { id: nextId++, text: t, age: 0 };
    words.push(w);
    const textWithSpace = t + ' ';
    const fullWidth = measureWord(textWithSpace);
    displayWords.push({
      id: w.id,
      text: textWithSpace,
      fullWidth,
      currentWidth: fullWidth,
      targetWidth: fullWidth,
      opacity: 0.7,
      targetOpacity: 0.7,
      age: 0,
      dying: false,
    });
  }

  lastOpTime = performance.now();
  setRunning(true);
  generate();
});

stopBtn.addEventListener('click', () => {
  setRunning(false);
});

// start render loop immediately
requestAnimationFrame(tick);
</script>

</body>
</html>
