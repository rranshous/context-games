<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Glint</title>
  <style>
    @font-face {
      font-family: 'TimeToPlay';
      src: url('./assets/timeToPlay%20v1_3/woff2/timeToPlay-Flat.woff2') format('woff2');
      font-weight: normal;
      font-style: normal;
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #020810;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      overflow: hidden;
    }
    canvas {
      image-rendering: pixelated;
      image-rendering: crisp-edges;
    }
    #game-wrapper {
      display: flex;
      align-items: flex-start;
    }
    #game-container {
      position: relative;
    }
    #inspector-panel {
      width: 320px;
      height: 720px;
      overflow-y: auto;
      background: #0a0e18;
      border: 1px solid #1a2a3a;
      border-left: none;
      font-family: 'Courier New', monospace;
      font-size: 12px;
      color: #8ab4d8;
      scrollbar-width: thin;
      scrollbar-color: #1a2a3a #0a0e18;
    }
    .inspector-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 10px 12px;
      border-bottom: 1px solid #1a2a3a;
      position: sticky;
      top: 0;
      background: #0a0e18;
      z-index: 1;
    }
    .inspector-title {
      color: #ff8844;
      font-size: 13px;
      font-weight: bold;
      letter-spacing: 1px;
      text-transform: uppercase;
    }
    #refresh-btn {
      background: #1a2a3a;
      color: #ff8844;
      border: 1px solid #2a3a4a;
      padding: 4px 10px;
      font-family: inherit;
      font-size: 11px;
      cursor: pointer;
      letter-spacing: 0.5px;
    }
    #refresh-btn:hover { background: #2a3a4a; }
    #refresh-btn:disabled { opacity: 0.4; cursor: default; }
    #inspector-content {
      padding: 8px;
    }
    .shark-card {
      background: #0d1220;
      border: 1px solid #1a2a3a;
      margin-bottom: 8px;
      padding: 10px;
    }
    .shark-card-header {
      color: #ff8844;
      font-size: 12px;
      font-weight: bold;
      margin-bottom: 6px;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    .shark-card-body {
      color: #8ab4d8;
      line-height: 1.5;
      white-space: pre-wrap;
    }
    .shark-card-body .unchanged {
      color: #4a6a8a;
      font-style: italic;
    }
    .inspector-loading {
      color: #4a6a8a;
      padding: 20px 12px;
      text-align: center;
      font-style: italic;
    }
    .shark-card { cursor: pointer; transition: border-color 0.15s; }
    .shark-card:hover { border-color: #ff8844; }
    .shark-card-badge {
      font-size: 10px;
      color: #44ddaa;
      border: 1px solid #2a5a4a;
      padding: 1px 5px;
      letter-spacing: 0.3px;
    }
    /* Detail view */
    .soma-section {
      background: #0d1220;
      border: 1px solid #1a2a3a;
      margin-bottom: 8px;
    }
    .soma-section-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 6px 10px;
      border-bottom: 1px solid #1a2a3a;
      background: #0f1628;
    }
    .soma-section-label {
      color: #ff8844;
      font-size: 11px;
      font-weight: bold;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }
    .soma-changed {
      font-size: 9px;
      color: #44ddaa;
      border: 1px solid #2a5a4a;
      padding: 1px 5px;
    }
    .soma-default {
      font-size: 9px;
      color: #4a6a8a;
      border: 1px solid #1a2a3a;
      padding: 1px 5px;
    }
    .soma-content {
      padding: 8px 10px;
      color: #8ab4d8;
      line-height: 1.5;
      white-space: pre-wrap;
      word-break: break-word;
      max-height: 300px;
      overflow-y: auto;
      font-size: 11px;
    }
    .soma-code {
      color: #a8d8a8;
      background: #080c14;
      font-size: 10px;
      line-height: 1.4;
      tab-size: 2;
    }
    .soma-link {
      color: #44ddaa;
      cursor: pointer;
      border-bottom: 1px dotted #44ddaa;
    }
    .soma-link:hover { color: #66ffcc; }
    .soma-section-highlight {
      animation: section-flash 1.5s ease-out;
    }
    @keyframes section-flash {
      0% { border-color: #44ddaa; box-shadow: 0 0 8px #44ddaa44; }
      100% { border-color: #1a2a3a; box-shadow: none; }
    }
  </style>
</head>
<body>
<div id="game-wrapper">
  <div id="game-container">
  </div>
  <div id="inspector-panel">
    <div class="inspector-header">
      <span class="inspector-title">Shark Intel</span>
      <button id="refresh-btn">REFRESH</button>
    </div>
    <div id="inspector-content">
      <div class="inspector-loading">Click REFRESH to scan shark somas</div>
    </div>
  </div>
</div>
<script type="importmap">
{
  "imports": {
    "three": "https://cdn.jsdelivr.net/npm/three@0.170.0/build/three.module.js",
    "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.170.0/examples/jsm/"
  }
}
</script>
<script type="module" src="dist/main.js"></script>
</body>
</html>
