<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
  <meta http-equiv="Pragma" content="no-cache">
  <meta http-equiv="Expires" content="0">
  <title>Tag You're Dead — Desert Demolition Derby</title>
  <style>
    @font-face {
      font-family: 'tEggst';
      src: url('assets/fonts/Analog%20Digits%20font%20pack%20volume%202%20v1_0/woff2%20files/tEggst-Light.woff2') format('woff2');
      font-weight: 300;
    }
    @font-face {
      font-family: 'tEggst';
      src: url('assets/fonts/Analog%20Digits%20font%20pack%20volume%202%20v1_0/woff2%20files/tEggst-Regular.woff2') format('woff2');
      font-weight: 400;
    }
    @font-face {
      font-family: 'tEggst';
      src: url('assets/fonts/Analog%20Digits%20font%20pack%20volume%202%20v1_0/woff2%20files/tEggst-Bold.woff2') format('woff2');
      font-weight: 700;
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #0a0604;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      font-family: 'tEggst', monospace;
      overflow: hidden;
    }
    #game-container {
      position: relative;
    }
    canvas {
      display: block;
      image-rendering: pixelated;
      border: 2px solid #3a2a1a;
    }
    #build-tag {
      position: fixed;
      bottom: 4px;
      right: 8px;
      color: #333;
      font-size: 10px;
      font-family: monospace;
    }
  </style>
</head>
<body>
  <div id="game-container">
    <canvas id="game-canvas"></canvas>
  </div>
  <div id="build-tag"></div>
  <script>
    // Cache-bust the module script
    var s = document.createElement('script');
    s.type = 'module';
    s.src = 'dist/main.js?v=' + Date.now();
    document.head.appendChild(s);
  </script>
  <script>document.getElementById('build-tag').textContent = 'b.' + String(Date.now()).slice(-6);</script>
  <script>
    // Scale canvas to fit viewport while preserving aspect ratio
    (function() {
      var c = document.getElementById('game-canvas');
      function fit() {
        // Wait until game has set canvas dimensions (default is 300x150)
        if (c.width < 400) return;
        var border = 4; // 2px border on each side
        var vw = window.innerWidth - border, vh = window.innerHeight - border;
        var scale = Math.min(vw / c.width, vh / c.height);
        c.style.width = Math.floor(c.width * scale) + 'px';
        c.style.height = Math.floor(c.height * scale) + 'px';
      }
      window.addEventListener('resize', fit);
      // Poll until canvas is initialized, then fit
      var poll = setInterval(function() {
        if (c.width >= 400) { clearInterval(poll); fit(); }
      }, 50);
    })();
  </script>
</body>
</html>
