<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Tag You're Dead — Desert Demolition Derby</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #0a0604;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      font-family: monospace;
      overflow: hidden;
    }
    #game-container {
      position: relative;
    }
    canvas {
      display: block;
      image-rendering: pixelated;
      border: 2px solid #3a2a1a;
    }
    #build-tag {
      position: fixed;
      bottom: 4px;
      right: 8px;
      color: #333;
      font-size: 10px;
      font-family: monospace;
    }
  </style>
</head>
<body>
  <div id="game-container">
    <canvas id="game-canvas"></canvas>
  </div>
  <div id="build-tag"></div>
  <script type="module" src="dist/main.js"></script>
  <script>document.getElementById('build-tag').textContent = 'b.' + String(Date.now()).slice(-6);</script>
</body>
</html>
