const images = {};
let loadedCount = 0;
const totalImages = Object.keys(ASSETS).length;

function loadImages(callback) {
  for (const [name, src] of Object.entries(ASSETS)) {
    const img = new Image();
    img.onload = () => {
      images[name] = img;
      loadedCount++;
      if (loadedCount >= totalImages) callback();
    };
    img.src = src;
  }
}

// ============================================================
// MAP GENERATION
// ============================================================
function buildMap() {
  mapTiles = [];
  parkingSpots = [];
  lavaPits = [];
  
  for (let r = 0; r < ROWS; r++) {
    mapTiles[r] = [];
    for (let c = 0; c < COLS; c++) {
      // Walls on edges
      if (r === 0 || r === ROWS - 1 || c === 0 || c === COLS - 1) {
        // Entrance gap at top center (5 tiles wide)
        if (r === 0 && c >= 8 && c <= 12) {
          mapTiles[r][c] = 0; // floor (entrance)
        } else {
          mapTiles[r][c] = 1; // wall
        }
      } else {
        mapTiles[r][c] = 0; // floor
      }
    }
  }
  
  // Add parking spots (2x3 tile rectangles)
  const spotPositions = [
    // Left column
    { tx: 2, ty: 3 }, { tx: 2, ty: 7 }, { tx: 2, ty: 11 },
    // Right column
    { tx: 16, ty: 3 }, { tx: 16, ty: 7 }, { tx: 16, ty: 11 },
    // Center spots (added in later waves)
    { tx: 7, ty: 5 }, { tx: 7, ty: 9 },
    { tx: 11, ty: 5 }, { tx: 11, ty: 9 },
    // Extra spots
    { tx: 7, ty: 12 }, { tx: 11, ty: 12 },
  ];
  
  const numSpots = Math.min(6 + wave, spotPositions.length);
  for (let i = 0; i < numSpots; i++) {
    const sp = spotPositions[i];
    parkingSpots.push({
      tx: sp.tx, ty: sp.ty,
      x: sp.tx * TS, y: sp.ty * TS,
      w: 2 * TS, h: 3 * TS,
      occupied: false,
      car: null,
    });
    // Mark tiles
    for (let dy = 0; dy < 3; dy++) {
      for (let dx = 0; dx < 2; dx++) {
        if (sp.ty + dy < ROWS && sp.tx + dx < COLS) {
          mapTiles[sp.ty + dy][sp.tx + dx] = 3;
        }
      }
    }
  }
  
  // Add lava pits based on wave
  const lavaConfigs = [
    // Wave 1: just 1 small pit
    [{ tx: 5, ty: 6 }, { tx: 6, ty: 6 }],
    // Wave 2+: more pits
    [{ tx: 13, ty: 6 }, { tx: 14, ty: 6 }],
    [{ tx: 5, ty: 10 }, { tx: 6, ty: 10 }],
    [{ tx: 13, ty: 10 }, { tx: 14, ty: 10 }],
    [{ tx: 9, ty: 7 }, { tx: 10, ty: 7 }],
    [{ tx: 9, ty: 3 }, { tx: 10, ty: 3 }],
    [{ tx: 5, ty: 3 }],
    [{ tx: 14, ty: 3 }],
  ];
  
  const numLavaGroups = Math.min(wave, lavaConfigs.length);
  for (let i = 0; i < numLavaGroups; i++) {
    for (const lp of lavaConfigs[i]) {
      lavaPits.push(lp);
      mapTiles[lp.ty][lp.tx] = 2;
    }
  }
}

// SPAWN CARS
// ============================================================
function spawnCar() {
  const vehicleIdx = Math.floor(Math.random() * VEHICLE_DEFS.length);
  const customerType = Math.random() < 0.5 ? 'eye' : 'slime';
  const maxPatience = Math.max(18, 45 - wave * 3); // seconds
  
  const car = {
    x: 10 * TS + TS/2, // entrance center
    y: -TS * 1.5,      // start above screen
    angle: 0,
    vx: 0, vy: 0,
    vehicleIdx,
    customerType,
    parked: false,
    destroyed: false,
    driven: false, // player is driving this car
    patience: maxPatience,
    maxPatience,
    waitX: 0, waitY: 0, // where the car waits
    arrivedAtWait: false,
    animTimer: 0,
  };
  
  // Pick a waiting position near entrance (spread across top area)
  const waitPositions = [
    { x: 10 * TS, y: 2 * TS },
    { x: 7 * TS,  y: 2 * TS },
    { x: 13 * TS, y: 2 * TS },
    { x: 5 * TS,  y: 2 * TS },
    { x: 15 * TS, y: 2 * TS },
    { x: 10 * TS, y: 3.5 * TS },
    { x: 7 * TS,  y: 3.5 * TS },
    { x: 13 * TS, y: 3.5 * TS },
  ];
  
  // Find an unoccupied wait position
  for (const wp of waitPositions) {
    const taken = cars.some(c => !c.parked && !c.destroyed && Math.abs(c.waitX - wp.x) < TS && Math.abs(c.waitY - wp.y) < TS);
    if (!taken) {
      car.waitX = wp.x;
      car.waitY = wp.y;
      break;
    }
  }
  if (car.waitX === 0) {
    car.waitX = (3 + Math.random() * 14) * TS;
    car.waitY = 2 * TS;
  }
  
  cars.push(car);
}

  buildMap();

  player.x = W / 2;

  gameState = 'waveIntro';
  waveIntroTimer = 2.5;
  waveIntroText = wave === 1 ? "WELCOME TO HELL'S PARKING LOT" : FLAVOR_TEXTS[Math.floor(Math.random() * FLAVOR_TEXTS.length)];
}

// ============================================================
// DRAWING HELPERS
// ============================================================
function drawTile(sheet, col, row, dx, dy, flipX) {
  const img = images[sheet];
  if (!img) return;
  ctx.save();
  if (flipX) {
    ctx.translate(dx + TS, dy);
    ctx.scale(-1, 1);
    ctx.drawImage(img, col * TILE, row * TILE, TILE, TILE, 0, 0, TS, TS);
  } else {
    ctx.drawImage(img, col * TILE, row * TILE, TILE, TILE, dx, dy, TS, TS);
  }
  ctx.restore();
}

function drawSpriteRect(sheet, sx, sy, sw, sh, dx, dy, dw, dh) {
  const img = images[sheet];
  if (!img) return;
  ctx.drawImage(img, sx, sy, sw, sh, dx, dy, dw, dh);
}

function drawAnimFrame(sheet, frameW, frameH, frameIdx, dx, dy, dw, dh) {
  const img = images[sheet];
  if (!img) return;
  ctx.drawImage(img, frameIdx * frameW, 0, frameW, frameH, dx, dy, dw, dh);
}

// ============================================================
// RENDER MAP
// ============================================================
function renderMap(time) {
  // Floor
  for (let r = 0; r < ROWS; r++) {
    for (let c = 0; c < COLS; c++) {
      const tile = mapTiles[r][c];
      const dx = c * TS;
      const dy = r * TS;
      
      if (tile === 1) {
        // Wall
        const below = r < ROWS - 1 ? mapTiles[r + 1][c] : 1;
        if (below !== 1) {
          drawTile('dungeon', TILES.wallMid.col, TILES.wallMid.row, dx, dy);
        } else {
          drawTile('dungeon', TILES.wallTop.col, TILES.wallTop.row, dx, dy);
        }
      } else if (tile === 2) {
        // Lava - animate between frames
        const lavaFrame = Math.floor(time * 3) % 4;
        const lavaT = [MAGMA.lava1, MAGMA.lava2, MAGMA.lava3, MAGMA.lava4][lavaFrame];
        drawTile('magma', lavaT.col, lavaT.row, dx, dy);
      } else {
        // Floor (including parking spots)
        const floorVariant = ((c + r) % 3);
        const ft = [TILES.floor1, TILES.floor2, TILES.floor3][floorVariant];
        drawTile('dungeon', ft.col, ft.row, dx, dy);
      }
    }
  }
  
  // Entrance markers at top
  drawTile('dungeon', TILES.doorTop.col, TILES.doorTop.row, 7 * TS, 0);
  drawTile('dungeon', TILES.doorTop.col, TILES.doorTop.row, 13 * TS, 0, true);
  // Entrance arrow indicator
  ctx.fillStyle = '#ffcc00';
  ctx.font = '16px SkullsNBones';
  ctx.textAlign = 'center';
  ctx.fillText('ENTRANCE', 10 * TS + TS/2, 14);
  ctx.textAlign = 'left';
  
  // Parking spot outlines
  for (const spot of parkingSpots) {
    if (!spot.occupied) {
      // Check if player is driving nearby — highlight green
      const cx = spot.x + spot.w / 2;
      const cy = spot.y + spot.h / 2;
      const inRange = player.inCar && Math.abs(player.x - cx) < spot.w && Math.abs(player.y - cy) < spot.h;

      // Darker floor tint for parking area
      ctx.fillStyle = inRange ? 'rgba(0, 255, 0, 0.2)' : 'rgba(0, 0, 0, 0.25)';
      ctx.fillRect(spot.x, spot.y, spot.w, spot.h);
      // Dashed border
      ctx.strokeStyle = inRange ? '#00ff88' : '#ffcc00';
      ctx.lineWidth = inRange ? 3 : 2;
      ctx.setLineDash([6, 4]);
      ctx.strokeRect(spot.x + 2, spot.y + 2, spot.w - 4, spot.h - 4);
      ctx.setLineDash([]);
      // "P" marker
      ctx.fillStyle = inRange ? 'rgba(0, 255, 136, 0.6)' : 'rgba(255, 204, 0, 0.3)';
      ctx.font = '28px SkullsNBones';
      ctx.textAlign = 'center';
      ctx.fillText('P', spot.x + spot.w / 2, spot.y + spot.h / 2 + 10);
      ctx.textAlign = 'left';
    } else {
      // Occupied spot - subtle green border
      ctx.strokeStyle = 'rgba(0, 255, 0, 0.3)';
      ctx.lineWidth = 1;
      ctx.strokeRect(spot.x + 2, spot.y + 2, spot.w - 4, spot.h - 4);
    }
  }
  
  // Decorative skeletons near walls
  const skelPositions = [
    { tx: 1, ty: 1 }, { tx: 18, ty: 1 },
    { tx: 1, ty: 13 }, { tx: 18, ty: 13 },
  ];
  const skelFrame = Math.floor(time * 4) % 3;
  for (const sp of skelPositions) {
    drawTile('monsters', MONSTER_TILES.skeleton1.col + skelFrame, MONSTER_TILES.skeleton1.row, sp.tx * TS, sp.ty * TS);
  }
  
  // Lava glow effect
  for (const lp of lavaPits) {
    const glow = 0.15 + 0.1 * Math.sin(time * 4 + lp.tx);
    ctx.fillStyle = `rgba(255, 80, 0, ${glow})`;
    ctx.beginPath();
    ctx.arc(lp.tx * TS + TS/2, lp.ty * TS + TS/2, TS * 1.5, 0, Math.PI * 2);
    ctx.fill();
  }
}

// ============================================================
// RENDER CAR
// ============================================================
function renderCar(car, time) {
  if (car.destroyed) return;
  const vdef = VEHICLE_DEFS[car.vehicleIdx];
  const dw = vdef.w * SCALE;
  const dh = vdef.h * SCALE;
  
  ctx.save();
  ctx.translate(car.x, car.y);
  ctx.rotate(car.angle);

  // Glow when being driven
  if (car.driven) {
    ctx.shadowColor = '#ffcc00';
    ctx.shadowBlur = 16 + Math.sin(time * 6) * 6;
    ctx.fillStyle = 'rgba(255,204,0,0.15)';
    ctx.fillRect(-dw/2 - 4, -dh/2 - 4, dw + 8, dh + 8);
  }

  drawSpriteRect('vehicles', vdef.x, vdef.y, vdef.w, vdef.h, -dw/2, -dh/2, dw, dh);
  ctx.shadowBlur = 0;
  ctx.restore();
  
  // Customer floating above (only if not parked and not driven)
  if (!car.parked && !car.driven) {
    const pct = car.patience / car.maxPatience;
    const bobSpeed = pct < 0.3 ? 8 : 3; // bounce faster when impatient
    const bobAmp = pct < 0.3 ? 6 : 4;
    const bobY = Math.sin(time * bobSpeed + car.x) * bobAmp;
    const custX = car.x - 16;
    const custY = car.y - dh/2 - 30 + bobY;

    if (car.customerType === 'eye') {
      // Use walk animation when impatient
      const sheet = pct < 0.3 ? 'eyeWalk' : 'eyeIdle';
      const frame = Math.floor(time * 4) % 3;
      drawAnimFrame(sheet, 20, 20, frame, custX, custY, 32, 32);
    } else {
      // Use jump animation when impatient
      if (pct < 0.3) {
        const frame = Math.floor(time * 6) % 6;
        drawAnimFrame('slimeJump', 32, 32, frame, custX, custY, 32, 32);
      } else {
        const frame = Math.floor(time * 3) % 4;
        drawAnimFrame('slimeIdle', 32, 32, frame, custX, custY, 32, 32);
      }
    }
    
    // Patience bar
    const barW = 40;
    const barH = 5;
    const barX = car.x - barW/2;
    const barY = custY - 8;

    // Flash when patience is low
    const flash = pct < 0.3 && Math.floor(time * 6) % 2 === 0;

    ctx.fillStyle = '#333';
    ctx.fillRect(barX, barY, barW, barH);

    const cr = Math.floor(255 * (1 - pct));
    const cg = Math.floor(255 * pct);
    ctx.fillStyle = flash ? '#ff0000' : `rgb(${cr},${cg},0)`;
    ctx.fillRect(barX, barY, barW * pct, barH);

    ctx.strokeStyle = flash ? '#ff4444' : '#000';
    ctx.lineWidth = 1;
    ctx.strokeRect(barX, barY, barW, barH);

    // Exclamation mark when very low
    if (pct < 0.2) {
      ctx.fillStyle = '#ff0000';
      ctx.font = '12px SkullsNBones';
      ctx.textAlign = 'center';
      ctx.fillText('!', car.x, custY - 14);
      ctx.textAlign = 'left';
    }
  }
}

// ============================================================
// RENDER PLAYER
// ============================================================
function renderPlayer(time) {
  if (player.inCar) return; // hidden when in car

  const animTimer = player.moving ? Math.floor(time * 8) % 2 : 0;
  const dirTiles = [
    [TILES.heroDown, TILES.heroDown2],
    [TILES.heroUp, TILES.heroUp2],
    [TILES.heroLeft, TILES.heroLeft2],
    [TILES.heroRight, TILES.heroRight2],
  ];
  const tile = dirTiles[player.dir][animTimer];

  // Glowing arrow indicator above player
  ctx.save();
  const bobY = Math.sin(time * 5) * 4;
  ctx.fillStyle = '#ffcc00';
  ctx.globalAlpha = 0.7 + Math.sin(time * 4) * 0.3;
  const ax = player.x;
  const ay = player.y - TS/2 - 12 + bobY;
  ctx.beginPath();
  ctx.moveTo(ax, ay + 10);
  ctx.lineTo(ax - 6, ay);
  ctx.lineTo(ax + 6, ay);
  ctx.fill();
  ctx.globalAlpha = 1;
  ctx.restore();

  // Draw character at 1.5x size for visibility
  const size = TS * 1.5;
  const img = images.dungeon;
  if (img) {
    ctx.drawImage(img, tile.col * TILE, tile.row * TILE, TILE, TILE,
      player.x - size/2, player.y - size/2, size, size);
  }
}

// ============================================================
// RENDER HUD
// ============================================================
function renderHUD() {
  ctx.font = '20px SkullsNBones';
  ctx.textBaseline = 'top';
  
  // Hearts (top-left)
  ctx.fillStyle = '#ff3333';
  for (let i = 0; i < hearts; i++) {
    ctx.fillText('\u2665', 10 + i * 28, 8);
  }
  
  // Score (top-right)
  ctx.fillStyle = '#ffcc00';
  ctx.textAlign = 'right';
  ctx.fillText('TIPS: ' + score, W - 10, 8);
  ctx.textAlign = 'left';
  
  // Wave (top-center)
  ctx.fillStyle = '#aaaaff';
  ctx.textAlign = 'center';
  ctx.fillText('WAVE ' + wave, W / 2, 8);
  ctx.textAlign = 'left';
  
  // Instructions when near a car
  if (!player.inCar) {
    const nearCar = findNearCar();
    if (nearCar) {
      ctx.fillStyle = '#ffffff';
      ctx.textAlign = 'center';
      ctx.font = '14px SkullsNBones';
      ctx.fillText('PRESS SPACE TO HOP IN', W / 2, H - 24);
      ctx.textAlign = 'left';
    }
  } else {
    // Check if near parking spot
    const nearSpot = findNearParkingSpot();
    ctx.fillStyle = '#ffffff';
    ctx.textAlign = 'center';
    ctx.font = '14px SkullsNBones';
    if (nearSpot) {
      ctx.fillText('PRESS SPACE TO PARK', W / 2, H - 24);
    } else {
      ctx.fillText('DRIVING - SPACE TO PARK IN A SPOT', W / 2, H - 24);
    }
    ctx.textAlign = 'left';
  }
}

// ============================================================
// FIND NEARBY CAR / PARKING SPOT
// ============================================================
function findNearCar() {
  for (const car of cars) {
    if (car.parked || car.destroyed || car.driven || !car.arrivedAtWait) continue;
    const dx = player.x - car.x;
    const dy = player.y - car.y;
    if (Math.abs(dx) < TS * 1.5 && Math.abs(dy) < TS * 1.5) return car;
  }
  return null;
}

function findNearParkingSpot() {
  if (!player.inCar) return null;
  const car = player.inCar;
  for (const spot of parkingSpots) {
    if (spot.occupied) continue;
    const cx = spot.x + spot.w / 2;
    const cy = spot.y + spot.h / 2;
    if (Math.abs(car.x - cx) < spot.w && Math.abs(car.y - cy) < spot.h) {
      return spot;
    }
  }
  return null;
}

// ============================================================
// COLLISION
// ============================================================
function isWall(px, py, halfW, halfH) {
  // Check all four corners
  const corners = [
    [px - halfW, py - halfH],
    [px + halfW, py - halfH],
    [px - halfW, py + halfH],
    [px + halfW, py + halfH],
  ];
  for (const [cx, cy] of corners) {
    const tc = Math.floor(cx / TS);
    const tr = Math.floor(cy / TS);
    if (tc < 0 || tc >= COLS || tr < 0 || tr >= ROWS) {
      // Allow going through entrance
      if (tr < 0 && tc >= 8 && tc <= 12) continue;
      return true;
    }
    if (tr >= 0 && tr < ROWS && tc >= 0 && tc < COLS) {
      if (mapTiles[tr][tc] === 1) return true;
    }
  }
  return false;
}

function isLava(px, py, halfW, halfH) {
  const corners = [
    [px - halfW, py - halfH],
    [px + halfW, py - halfH],
    [px - halfW, py + halfH],
    [px + halfW, py + halfH],
    [px, py], // center
  ];
  for (const [cx, cy] of corners) {
    const tc = Math.floor(cx / TS);
    const tr = Math.floor(cy / TS);
    if (tr >= 0 && tr < ROWS && tc >= 0 && tc < COLS) {
      if (mapTiles[tr][tc] === 2) return true;
    }
  }
  return false;
}

// ============================================================
// UPDATE
// ============================================================
function update(dt, time) {
  if (gameState === 'waveIntro') {
    waveIntroTimer -= dt;
    if (waveIntroTimer <= 0) {
      gameState = 'playing';
    }
    return;
  }
  
  if (gameState !== 'playing') return;
  
  // Spawn cars
  if (carsToSpawn > 0) {
    spawnTimer -= dt;
    if (spawnTimer <= 0) {
      spawnCar();
      carsToSpawn--;
      spawnTimer = 2 + Math.random() * 2; // 2-4 seconds between spawns
    }
  }
  
  // Update cars
  for (const car of cars) {
    if (car.destroyed) continue;
    
    if (car.driven) {
      // Car follows player controls with momentum
      let ax = 0, ay = 0;
      if (isLeft())  ax = -1;
      if (isRight()) ax = 1;
      if (isUp())    ay = -1;
      if (isDown())  ay = 1;
      
      const accel = 600;
      const friction = 3;
      car.vx += ax * accel * dt;
      car.vy += ay * accel * dt;
      car.vx *= (1 - friction * dt);
      car.vy *= (1 - friction * dt);
      
      // Speed cap
      const speed = Math.sqrt(car.vx * car.vx + car.vy * car.vy);
      if (speed > CAR_SPEED) {
        car.vx = (car.vx / speed) * CAR_SPEED;
        car.vy = (car.vy / speed) * CAR_SPEED;
      }
      
      const vdef = VEHICLE_DEFS[car.vehicleIdx];
      const halfW = vdef.w * SCALE / 2 - 4;
      const halfH = vdef.h * SCALE / 2 - 4;
      
      const newX = car.x + car.vx * dt;
      const newY = car.y + car.vy * dt;
      
      // Wall collision
      if (!isWall(newX, car.y, halfW, halfH)) {
        car.x = newX;
      } else {
        car.vx *= -0.3;
      }
      if (!isWall(car.x, newY, halfW, halfH)) {
        car.y = newY;
      } else {
        car.vy *= -0.3;
      }
      
      // Car angle follows velocity
      if (speed > 20) {
        car.angle = Math.atan2(car.vy, car.vx) + Math.PI / 2;
      }
      
      // Lava check
      if (isLava(car.x, car.y, halfW * 0.6, halfH * 0.6)) {
        // Car destroyed!
        car.destroyed = true;
        car.driven = false;
        player.inCar = null;
        player.x = car.x;
        player.y = car.y - TS;
        hearts--;
        shakeTimer = 0.5;
        shakeIntensity = 8;
        const lavaMessages = ['CRISPY!', 'INTO THE LAVA!', 'EXTRA TOASTY!', 'WELL DONE!'];
        addFloatingText(car.x, car.y - 40, lavaMessages[Math.floor(Math.random() * lavaMessages.length)], '#ff6600');
        
        if (hearts <= 0) {
          gameState = 'gameover';
        }
        checkWaveComplete();
      }

      // Update player position to car
      player.x = car.x;
      player.y = car.y;
      
    } else if (!car.parked) {
      // Drive to wait position
      if (!car.arrivedAtWait) {
        const dx = car.waitX - car.x;
        const dy = car.waitY - car.y;
        const dist = Math.sqrt(dx * dx + dy * dy);
        if (dist > 3) {
          const spd = 100;
          car.x += (dx / dist) * spd * dt;
          car.y += (dy / dist) * spd * dt;
          car.angle = Math.atan2(dy, dx) + Math.PI / 2;
        } else {
          car.arrivedAtWait = true;
          car.angle = 0; // face down
        }
      }
      
      // Patience countdown (only when arrived)
      if (car.arrivedAtWait) {
        car.patience -= dt;
        if (car.patience <= 0) {
          // Customer leaves!
          car.destroyed = true;
          hearts--;
          shakeTimer = 0.3;
          shakeIntensity = 4;
          const leaveMessages = ['TOO SLOW!', 'CUSTOMER LEFT!', 'PATIENCE EXPIRED!', 'TERRIBLE SERVICE!'];
          addFloatingText(car.x, car.y - 40, leaveMessages[Math.floor(Math.random() * leaveMessages.length)], '#ff3333');
          
          if (hearts <= 0) {
            gameState = 'gameover';
          }
          checkWaveComplete();
        }
      }
    }
  }

  // Check wave completion (all cars resolved)
  function checkWaveComplete() {
    if (gameState !== 'playing') return;
    if (carsToSpawn > 0) return; // still spawning
    const unresolved = cars.filter(c => !c.parked && !c.destroyed);
    if (unresolved.length === 0 && cars.length >= totalCarsThisWave) {
      wave++;
      const waveMessages = ['WAVE CLEARED!', 'NICE PARKING!', 'THE DARK LORD IS PLEASED!'];
      addFloatingText(W/2, H/2, waveMessages[Math.floor(Math.random() * waveMessages.length)], '#00ff88');
      setTimeout(() => startWave(), 1500);
    }
  }

  // Player movement (on foot)
  if (!player.inCar) {
    let dx = 0, dy = 0;
    if (isLeft())  { dx = -1; player.dir = 2; }
    if (isRight()) { dx = 1; player.dir = 3; }
    if (isUp())    { dy = -1; player.dir = 1; }
    if (isDown())  { dy = 1; player.dir = 0; }
    
    player.moving = dx !== 0 || dy !== 0;
    
    if (player.moving) {
      // Normalize diagonal
      const len = Math.sqrt(dx * dx + dy * dy);
      dx /= len; dy /= len;
      
      const newX = player.x + dx * PLAYER_SPEED * dt;
      const newY = player.y + dy * PLAYER_SPEED * dt;
      const half = PLAYER_SIZE / 2;
      
      if (!isWall(newX, player.y, half, half)) player.x = newX;
      if (!isWall(player.x, newY, half, half)) player.y = newY;
    }
  }
  
  // Space action (debounced)
  if (isSpace() && spaceReleased) {
    spaceReleased = false;
    
    if (player.inCar) {
      // Try to park
      const spot = findNearParkingSpot();
      if (spot) {
        const car = player.inCar;
        car.parked = true;
        car.driven = false;
        car.x = spot.x + spot.w / 2;
        car.y = spot.y + spot.h / 2;
        car.angle = 0;
        car.vx = 0;
        car.vy = 0;
        spot.occupied = true;
        spot.car = car;
        
        player.inCar = null;
        player.x = car.x + spot.w / 2 + 8;
        player.y = car.y;
        
        // Score!
        const tips = 10 * wave;
        score += tips;
        carsParkedThisWave++;
        addFloatingText(car.x, car.y - 40, '+' + tips + ' TIPS!', '#ffcc00');

        // Bonus for quick parking (> 70% patience remaining)
        const pctLeft = car.patience / car.maxPatience;
        if (pctLeft > 0.7) {
          const bonus = 5 * wave;
          score += bonus;
          addFloatingText(car.x, car.y - 60, 'SPEED BONUS +' + bonus, '#00ff88');
        }
        
        // Check wave complete
        checkWaveComplete();
      }
    } else {
      // Try to enter car
      const car = findNearCar();
      if (car) {
        car.driven = true;
        player.inCar = car;
        car.vx = 0;
        car.vy = 0;
      }
    }
  }
  if (!isSpace()) spaceReleased = true;
  
  // Screen shake decay
  if (shakeTimer > 0) {
    shakeTimer -= dt;
  }

  // Update floating texts
  for (let i = floatingTexts.length - 1; i >= 0; i--) {
    floatingTexts[i].timer -= dt;
    floatingTexts[i].y -= 30 * dt; // float upward
    if (floatingTexts[i].timer <= 0) floatingTexts.splice(i, 1);
  }
}

// ============================================================
// RENDER
// ============================================================
function render(time) {
  ctx.save();
  
  // Screen shake
  if (shakeTimer > 0) {
    const sx = (Math.random() - 0.5) * shakeIntensity * 2;
    const sy = (Math.random() - 0.5) * shakeIntensity * 2;
    ctx.translate(sx, sy);
  }
  
  // Clear
  ctx.fillStyle = '#111';
  ctx.fillRect(-10, -10, W + 20, H + 20);
  
  if (gameState === 'title') {
    renderTitleScreen(time);
  } else if (gameState === 'gameover') {
    renderGameOver(time);
  } else {
    // Game / wave intro
    renderMap(time);
    
    // Sort entities by Y for depth
    const entities = [];
    for (const car of cars) {
      if (!car.destroyed) entities.push({ type: 'car', y: car.y, obj: car });
    }
    entities.push({ type: 'player', y: player.y, obj: player });
    entities.sort((a, b) => a.y - b.y);
    
    for (const e of entities) {
      if (e.type === 'car') renderCar(e.obj, time);
      else renderPlayer(time);
    }
    
    // Fire effects for destroyed cars
    for (const car of cars) {
      if (car.destroyed) {
        // Multiple fire particles
        for (let i = 0; i < 4; i++) {
          const flicker = Math.random();
          const colors = ['rgba(255,200,0,', 'rgba(255,100,0,', 'rgba(255,50,0,', 'rgba(200,0,0,'];
          ctx.fillStyle = colors[i] + (0.4 + flicker * 0.4) + ')';
          ctx.beginPath();
          ctx.arc(
            car.x + (Math.random() - 0.5) * 30,
            car.y + (Math.random() - 0.5) * 30 - Math.random() * 15,
            4 + Math.random() * 10, 0, Math.PI * 2
          );
          ctx.fill();
        }
        // Smoke
        ctx.fillStyle = 'rgba(60, 60, 60, 0.3)';
        ctx.beginPath();
        ctx.arc(car.x + (Math.random() - 0.5) * 20, car.y - 20 - Math.random() * 20,
                8 + Math.random() * 8, 0, Math.PI * 2);
        ctx.fill();
      }
    }
    
    renderHUD();

    // Floating texts
    for (const ft of floatingTexts) {
      const alpha = Math.min(1, ft.timer / (ft.maxTimer * 0.3));
      ctx.globalAlpha = alpha;
      ctx.fillStyle = ft.color;
      ctx.font = '16px SkullsNBones';
      ctx.textAlign = 'center';
      ctx.fillText(ft.text, ft.x, ft.y);
      ctx.textAlign = 'left';
      ctx.globalAlpha = 1;
    }

    // Wave intro overlay
    if (gameState === 'waveIntro') {
      ctx.fillStyle = 'rgba(0, 0, 0, 0.7)';
      ctx.fillRect(0, 0, W, H);
      
      ctx.fillStyle = '#ff4444';
      ctx.font = '36px SkullsNBones';
      ctx.textAlign = 'center';
      ctx.fillText('WAVE ' + wave, W / 2, H / 2 - 40);
      
      ctx.fillStyle = '#ffcc00';
      ctx.font = '16px SkullsNBones';
      ctx.fillText(waveIntroText, W / 2, H / 2 + 20);
      ctx.textAlign = 'left';
    }
  }
  
  ctx.restore();
}

// ============================================================
// TITLE SCREEN
// ============================================================
function renderTitleScreen(time) {
  // Dark background with lava glow
  ctx.fillStyle = '#0a0505';
  ctx.fillRect(0, 0, W, H);
  
  // Animated lava border
  for (let x = 0; x < COLS; x++) {
    const lavaFrame = Math.floor(time * 3 + x * 0.5) % 4;
    const lavaT = [MAGMA.lava1, MAGMA.lava2, MAGMA.lava3, MAGMA.lava4][lavaFrame];
    drawTile('magma', lavaT.col, lavaT.row, x * TS, 0);
    drawTile('magma', lavaT.col, lavaT.row, x * TS, (ROWS - 1) * TS);
  }
  for (let y = 1; y < ROWS - 1; y++) {
    const lavaFrame = Math.floor(time * 3 + y * 0.5) % 4;
    const lavaT = [MAGMA.lava1, MAGMA.lava2, MAGMA.lava3, MAGMA.lava4][lavaFrame];
    drawTile('magma', lavaT.col, lavaT.row, 0, y * TS);
    drawTile('magma', lavaT.col, lavaT.row, (COLS - 1) * TS, y * TS);
  }
  
  // Pulsing lava glow overlay
  const glowPulse = 0.2 + 0.1 * Math.sin(time * 2);
  ctx.fillStyle = `rgba(255, 60, 0, ${glowPulse})`;
  ctx.fillRect(0, 0, W, H);
  
  // Title
  const titleY = H / 2 - 80 + Math.sin(time * 1.5) * 5;
  
  // Shadow
  ctx.fillStyle = '#000';
  ctx.font = '52px SkullsNBones';
  ctx.textAlign = 'center';
  ctx.fillText('DUNGEON', W / 2 + 3, titleY + 3);
  ctx.fillText('VALET', W / 2 + 3, titleY + 58);
  
  // Main title with flickering color
  const flicker = 0.8 + 0.2 * Math.sin(time * 8);
  ctx.fillStyle = `rgba(255, ${Math.floor(180 * flicker)}, ${Math.floor(50 * flicker)}, 1)`;
  ctx.fillText('DUNGEON', W / 2, titleY);
  ctx.fillText('VALET', W / 2, titleY + 55);
  
  // Subtitle
  ctx.fillStyle = '#aaa';
  ctx.font = '14px SkullsNBones';
  ctx.fillText('PARK CARS. AVOID LAVA. SERVE DEMONS.', W / 2, H / 2 + 40);
  
  // Blinking prompt
  if (Math.floor(time * 2) % 2 === 0) {
    ctx.fillStyle = '#ffcc00';
    ctx.font = '18px SkullsNBones';
    ctx.fillText('PRESS SPACE TO START', W / 2, H / 2 + 100);
  }
  
  // Decorative monsters
  const skelFrame = Math.floor(time * 4) % 3;
  drawTile('monsters', MONSTER_TILES.skeleton1.col + skelFrame, MONSTER_TILES.skeleton1.row, 60, H - 100);
  drawTile('monsters', MONSTER_TILES.skeleton1.col + skelFrame, MONSTER_TILES.skeleton1.row, W - 92, H - 100);
  
  // Eyeball and slime floating
  const eyeFrame = Math.floor(time * 4) % 3;
  const slimeFrame = Math.floor(time * 3) % 4;
  drawAnimFrame('eyeIdle', 20, 20, eyeFrame, 100, 200 + Math.sin(time * 2) * 10, 40, 40);
  drawAnimFrame('slimeIdle', 32, 32, slimeFrame, W - 140, 200 + Math.sin(time * 2.5) * 10, 48, 48);
  
  ctx.textAlign = 'left';
}

// ============================================================
// GAME OVER SCREEN
// ============================================================
function renderGameOver(time) {
  ctx.fillStyle = '#0a0000';
  ctx.fillRect(0, 0, W, H);
  
  // Blood red glow
  const pulse = 0.3 + 0.15 * Math.sin(time * 3);
  ctx.fillStyle = `rgba(150, 0, 0, ${pulse})`;
  ctx.fillRect(0, 0, W, H);
  
  ctx.textAlign = 'center';
  
  // Title
  ctx.fillStyle = '#ff0000';
  ctx.font = '40px SkullsNBones';
  ctx.fillText("YOU'RE FIRED!", W / 2, H / 2 - 60);
  
  // Literally on fire
  ctx.fillStyle = '#ff6600';
  ctx.font = '16px SkullsNBones';
  ctx.fillText('(INTO THE LAVA PIT)', W / 2, H / 2 - 20);
  
  // Score
  ctx.fillStyle = '#ffcc00';
  ctx.font = '24px SkullsNBones';
  ctx.fillText('TOTAL TIPS: ' + score, W / 2, H / 2 + 30);
  
  ctx.fillStyle = '#aaa';
  ctx.font = '16px SkullsNBones';
  ctx.fillText('WAVES SURVIVED: ' + (wave - 1), W / 2, H / 2 + 60);
  
  // Restart prompt
  if (Math.floor(time * 2) % 2 === 0) {
    ctx.fillStyle = '#ffcc00';
    ctx.font = '18px SkullsNBones';
    ctx.fillText('PRESS SPACE TO TRY AGAIN', W / 2, H / 2 + 120);
  }
  
  ctx.textAlign = 'left';
}

// ============================================================
// GAME LOOP
// ============================================================
let lastTime = 0;

function gameLoop(timestamp) {
  const time = timestamp / 1000;
  const dt = Math.min(time - lastTime, 0.05); // cap delta
  lastTime = time;
  
  // Handle title/gameover space press
  if (gameState === 'title' && isSpace() && spaceReleased) {
    spaceReleased = false;
    wave = 1;
    score = 0;
    hearts = 3;
    startWave();
  }
  if (gameState === 'gameover' && isSpace() && spaceReleased) {
    spaceReleased = false;
    gameState = 'title';
  }
  if (!isSpace()) spaceReleased = true;
  
  update(dt, time);
  render(time);
  
  requestAnimationFrame(gameLoop);
}

// ============================================================
// INIT
// ============================================================
loadImages(() => {
  requestAnimationFrame(gameLoop);
});

</script>
</body>
