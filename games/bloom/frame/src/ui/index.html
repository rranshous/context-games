<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>bloom — frame</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'SF Mono', 'Fira Code', 'Consolas', monospace;
      background: #0a0a0f;
      color: #c8c8d0;
      height: 100vh;
      display: flex;
      flex-direction: column;
    }
    header {
      padding: 8px 20px;
      border-bottom: 1px solid #1a1a2e;
      font-size: 14px;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    header h1 { font-size: 14px; font-weight: normal; color: #555; }
    header .status { color: #333; font-size: 10px; }
    main { flex: 1; display: flex; overflow: hidden; }

    /* Chat */
    #chat { flex: 1; display: flex; flex-direction: column; min-width: 320px; }
    #messages { flex: 1; overflow-y: auto; padding: 12px 16px; }
    .msg { margin-bottom: 12px; line-height: 1.5; }
    .msg .head { font-size: 11px; letter-spacing: 0.5px; margin-bottom: 2px; }
    .msg .head .handle { text-transform: uppercase; }
    .msg .head .ts { color: #333; margin-left: 8px; font-size: 10px; }
    .msg .text { font-size: 13px; word-break: break-word; line-height: 1.6; }
    .msg .text p { margin: 0 0 6px; }
    .msg .text p:last-child { margin-bottom: 0; }
    .msg .text code { background: #1a1a2e; padding: 1px 5px; border-radius: 3px; font-size: 12px; }
    .msg .text pre { background: #0e0e16; border: 1px solid #1a1a2e; padding: 8px 10px; border-radius: 4px; overflow-x: auto; margin: 6px 0; font-size: 12px; line-height: 1.4; }
    .msg .text pre code { background: none; padding: 0; }
    .msg .text strong { color: #e0e0e8; }
    .msg .text em { color: #b0b0b8; }
    .msg .text ul, .msg .text ol { margin: 4px 0 4px 18px; }
    .msg .text li { margin-bottom: 2px; }
    .msg .text h1, .msg .text h2, .msg .text h3 { color: #e0e0e8; font-size: 13px; margin: 8px 0 4px; }
    .msg .text h1 { font-size: 15px; }
    .msg .text h2 { font-size: 14px; }
    .msg.bloom .handle { color: #6a9fb5; }
    .msg.robby .handle { color: #a3be8c; }
    .msg.other .handle { color: #666; }

    #chat-form {
      display: flex; padding: 8px 16px; border-top: 1px solid #1a1a2e; gap: 8px;
    }
    #chat-input {
      flex: 1; background: #0e0e16; border: 1px solid #1a1a2e; color: #c8c8d0;
      font-family: inherit; font-size: 13px; padding: 8px 10px; border-radius: 4px; outline: none;
    }
    #chat-input:focus { border-color: #2a2a3e; }
    #chat-form button {
      background: #1a1a2e; border: 1px solid #2a2a3e; color: #666;
      font-family: inherit; font-size: 12px; padding: 8px 14px; border-radius: 4px; cursor: pointer;
    }
    #chat-form button:hover { background: #2a2a3e; color: #c8c8d0; }

    /* Right panel: soma + artifacts */
    #right-panel {
      width: 420px; display: flex; flex-direction: column; border-left: 1px solid #1a1a2e;
    }

    /* Soma viewer */
    #soma-panel { flex: 1; display: flex; flex-direction: column; overflow: hidden; }
    #soma-tabs {
      display: flex; flex-wrap: wrap; padding: 6px 8px 0; gap: 2px;
      border-bottom: 1px solid #1a1a2e;
    }
    .soma-tab {
      padding: 4px 10px; font-size: 10px; text-transform: uppercase; letter-spacing: 0.5px;
      color: #444; cursor: pointer; border-radius: 4px 4px 0 0; border: 1px solid transparent;
      border-bottom: none; background: transparent; font-family: inherit;
    }
    .soma-tab:hover { color: #888; }
    .soma-tab.active { color: #6a9fb5; background: #0e0e16; border-color: #1a1a2e; }
    .soma-tab.changed { color: #ebcb8b; }
    #soma-content {
      flex: 1; overflow-y: auto; padding: 10px 14px; font-size: 12px;
      white-space: pre-wrap; word-break: break-word; color: #999;
      background: #0e0e16; line-height: 1.6;
    }

    /* Hosted files (collapsed into right panel) */
    #hosted {
      border-top: 1px solid #1a1a2e; max-height: 180px; display: flex; flex-direction: column;
    }
    #hosted h3 {
      font-size: 10px; text-transform: uppercase; letter-spacing: 0.5px;
      color: #444; padding: 8px 14px; border-bottom: 1px solid #1a1a2e; font-weight: normal;
    }
    #hosted-list { flex: 1; overflow-y: auto; padding: 4px 8px; }
    .hosted-item {
      padding: 6px 10px; border-radius: 4px; font-size: 12px; margin-bottom: 1px;
    }
    .hosted-item a { color: #b48ead; text-decoration: none; }
    .hosted-item a:hover { text-decoration: underline; }

    .empty { padding: 12px; color: #222; font-size: 11px; }

    ::-webkit-scrollbar { width: 5px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: #1a1a2e; border-radius: 3px; }
  </style>
</head>
<body>
  <header>
    <h1>bloom frame</h1>
    <span class="status" id="status"></span>
  </header>
  <main>
    <section id="chat">
      <div id="messages"><div class="empty">waiting...</div></div>
      <form id="chat-form">
        <input id="chat-input" placeholder="say something..." autocomplete="off" autofocus>
        <button type="submit">send</button>
      </form>
    </section>
    <div id="right-panel">
      <div id="soma-panel">
        <div id="soma-tabs"></div>
        <div id="soma-content"><div class="empty">loading soma...</div></div>
      </div>
      <aside id="hosted">
        <h3>hosted files</h3>
        <div id="hosted-list"><div class="empty">none yet</div></div>
      </aside>
    </div>
  </main>

  <script>
    const HANDLE = 'robby';
    const POLL_MS = 2000;
    let lastMsgCount = 0;
    const log = (tag, ...args) => console.log(`%c[${tag}]`, 'color: #6a9fb5; font-weight: bold', ...args);

    const messagesEl = document.getElementById('messages');
    const chatForm = document.getElementById('chat-form');
    const chatInput = document.getElementById('chat-input');
    const hostedListEl = document.getElementById('hosted-list');
    const somaTabsEl = document.getElementById('soma-tabs');
    const somaContentEl = document.getElementById('soma-content');

    function esc(s) {
      const d = document.createElement('div');
      d.textContent = s;
      return d.innerHTML;
    }

    function md(raw) {
      let s = esc(raw);
      // code blocks: ```...```
      s = s.replace(/```(\w*)\n?([\s\S]*?)```/g, (_, lang, code) =>
        `<pre><code>${code.replace(/\n$/, '')}</code></pre>`);
      // inline code
      s = s.replace(/`([^`\n]+)`/g, '<code>$1</code>');
      // headers
      s = s.replace(/^### (.+)$/gm, '<h3>$1</h3>');
      s = s.replace(/^## (.+)$/gm, '<h2>$1</h2>');
      s = s.replace(/^# (.+)$/gm, '<h1>$1</h1>');
      // bold + italic
      s = s.replace(/\*\*\*(.+?)\*\*\*/g, '<strong><em>$1</em></strong>');
      s = s.replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>');
      s = s.replace(/\*(.+?)\*/g, '<em>$1</em>');
      // unordered lists
      s = s.replace(/^[-*] (.+)$/gm, '<li>$1</li>');
      s = s.replace(/((?:<li>.*<\/li>\n?)+)/g, '<ul>$1</ul>');
      // paragraphs: split on double newlines, wrap non-block content
      s = s.split(/\n{2,}/).map(block => {
        block = block.trim();
        if (!block) return '';
        if (/^<(h[1-3]|ul|ol|pre|li)/.test(block)) return block;
        return `<p>${block.replace(/\n/g, '<br>')}</p>`;
      }).join('\n');
      return s;
    }

    // --- Chat ---

    async function fetchMessages() {
      try {
        const res = await fetch('/api/chat?count=200');
        const msgs = await res.json();
        if (msgs.length !== lastMsgCount) {
          const newMsgs = msgs.slice(lastMsgCount);
          for (const m of newMsgs) {
            log('chat', `${m.handle}: ${m.text}`);
          }
          renderMessages(msgs);
          lastMsgCount = msgs.length;
        }
      } catch (err) { console.warn('[frame] chat poll error', err); }
    }

    function renderMessages(msgs) {
      if (!msgs.length) {
        messagesEl.innerHTML = '<div class="empty">waiting...</div>';
        return;
      }
      const atBottom = messagesEl.scrollTop + messagesEl.clientHeight >= messagesEl.scrollHeight - 30;
      messagesEl.innerHTML = msgs.map(m => {
        const cls = m.handle === 'bloom' ? 'bloom' : m.handle === HANDLE ? 'robby' : 'other';
        const time = new Date(m.ts).toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
        return `<div class="msg ${cls}"><div class="head"><span class="handle">${esc(m.handle)}</span><span class="ts">${time}</span></div><div class="text">${md(m.text)}</div></div>`;
      }).join('');
      if (atBottom) messagesEl.scrollTop = messagesEl.scrollHeight;
    }

    chatForm.addEventListener('submit', async (e) => {
      e.preventDefault();
      const text = chatInput.value.trim();
      if (!text) return;
      chatInput.value = '';
      try {
        await fetch('/api/chat', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ handle: HANDLE, text }),
        });
        await fetchMessages();
      } catch {}
    });

    // --- Soma viewer ---

    const SOMA_SECTIONS = ['identity', 'responsibilities', 'memory', 'things_noticed', 'signal_handler', 'recent_actions', 'custom_tools'];
    const SOMA_LABELS = { identity: 'id', responsibilities: 'resp', memory: 'mem', things_noticed: 'noticed', signal_handler: 'handler', recent_actions: 'actions', custom_tools: 'tools' };
    let currentSomaTab = 'identity';
    let somaCache = {};
    let prevSomaCache = {};

    function buildSomaTabs() {
      somaTabsEl.innerHTML = SOMA_SECTIONS.map(s => {
        const label = SOMA_LABELS[s] || s;
        const active = s === currentSomaTab ? 'active' : '';
        const changed = somaCache[s] && prevSomaCache[s] && somaCache[s] !== prevSomaCache[s] ? 'changed' : '';
        return `<button class="soma-tab ${active} ${changed}" data-section="${s}">${label}</button>`;
      }).join('');
    }

    somaTabsEl.addEventListener('click', (e) => {
      const tab = e.target.closest('.soma-tab');
      if (!tab) return;
      currentSomaTab = tab.dataset.section;
      buildSomaTabs();
      renderSomaContent();
    });

    function renderSomaContent() {
      const content = somaCache[currentSomaTab] || '';
      somaContentEl.textContent = content || '(empty)';
    }

    async function fetchSoma() {
      try {
        const res = await fetch('/api/soma');
        const soma = await res.json();
        prevSomaCache = { ...somaCache };
        somaCache = soma;
        buildSomaTabs();
        renderSomaContent();
      } catch {}
    }

    // --- Hosted files ---

    let lastHostedCount = 0;
    async function fetchHosted() {
      try {
        const res = await fetch('/api/host');
        const files = await res.json();
        if (files.length !== lastHostedCount) {
          const newFiles = files.slice(lastHostedCount);
          for (const f of newFiles) log('hosted', f);
          lastHostedCount = files.length;
        }
        if (!files.length) {
          hostedListEl.innerHTML = '<div class="empty">none yet</div>';
          return;
        }
        hostedListEl.innerHTML = files.map(f =>
          `<div class="hosted-item"><a href="/hosted/${esc(f)}" target="_blank">${esc(f)}</a></div>`
        ).join('');
      } catch {}
    }

    // --- Activity feed (chassis events in console) ---

    const ACTIVITY_STYLES = {
      signal:    'color: #ebcb8b; font-weight: bold',
      inference: 'color: #555; font-style: italic',
      thinking:  'color: #888',
      tool:      'color: #b48ead',
      tool_ok:   'color: #a3be8c',
      tool_err:  'color: #bf616a; font-weight: bold',
      done:      'color: #6a9fb5; font-weight: bold',
    };
    let lastActivityTs = 0;

    async function fetchActivity() {
      try {
        const res = await fetch(`/api/activity?after=${lastActivityTs}`);
        const events = await res.json();
        for (const e of events) {
          const style = ACTIVITY_STYLES[e.type] || 'color: #666';
          console.log(`%c[${e.type}]`, style, e.detail);
          lastActivityTs = Math.max(lastActivityTs, e.ts);
        }
      } catch {}
    }

    // --- Poll ---
    fetchMessages();
    fetchHosted();
    fetchActivity();
    fetchSoma();
    setInterval(fetchMessages, POLL_MS);
    setInterval(fetchHosted, POLL_MS * 3);
    setInterval(fetchActivity, 1000);
    setInterval(fetchSoma, 3000);
  </script>
</body>
</html>
