<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>qacky — frame</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'SF Mono', 'Fira Code', 'Consolas', monospace;
      background: #0a0a0f;
      color: #c8c8d0;
      height: 100vh;
      display: flex;
      flex-direction: column;
    }
    header {
      padding: 12px 20px;
      border-bottom: 1px solid #1a1a2e;
      font-size: 14px;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    header h1 { font-size: 14px; font-weight: normal; color: #555; }
    header .status { color: #333; font-size: 10px; }
    main { flex: 1; display: flex; overflow: hidden; }

    /* Chat */
    #chat { flex: 1; display: flex; flex-direction: column; }
    #messages { flex: 1; overflow-y: auto; padding: 16px 20px; }
    .msg { margin-bottom: 14px; line-height: 1.5; }
    .msg .head { font-size: 11px; letter-spacing: 0.5px; margin-bottom: 2px; }
    .msg .head .handle { text-transform: uppercase; }
    .msg .head .ts { color: #333; margin-left: 8px; font-size: 10px; }
    .msg .text { font-size: 14px; white-space: pre-wrap; word-break: break-word; }
    .msg.bloom .handle { color: #6a9fb5; }
    .msg.robby .handle { color: #a3be8c; }
    .msg.other .handle { color: #666; }

    #chat-form {
      display: flex; padding: 12px 20px; border-top: 1px solid #1a1a2e; gap: 8px;
    }
    #chat-input {
      flex: 1; background: #0e0e16; border: 1px solid #1a1a2e; color: #c8c8d0;
      font-family: inherit; font-size: 14px; padding: 10px 12px; border-radius: 4px; outline: none;
    }
    #chat-input:focus { border-color: #2a2a3e; }
    #chat-form button {
      background: #1a1a2e; border: 1px solid #2a2a3e; color: #666;
      font-family: inherit; font-size: 13px; padding: 10px 16px; border-radius: 4px; cursor: pointer;
    }
    #chat-form button:hover { background: #2a2a3e; color: #c8c8d0; }

    /* Artifacts */
    #artifacts {
      width: 280px; display: flex; flex-direction: column; border-left: 1px solid #1a1a2e;
    }
    #artifacts h3 {
      font-size: 11px; text-transform: uppercase; letter-spacing: 0.5px;
      color: #444; padding: 12px 16px; border-bottom: 1px solid #1a1a2e; font-weight: normal;
    }
    #artifact-list { flex: 1; overflow-y: auto; padding: 8px; }
    .art-item {
      padding: 8px 12px; border-radius: 4px; cursor: pointer; font-size: 13px; margin-bottom: 2px;
    }
    .art-item:hover { background: #0e0e16; }
    .art-item.active { background: #1a1a2e; }
    .art-item .name { color: #b48ead; }
    .art-item .meta { font-size: 10px; color: #333; margin-top: 2px; }

    #artifact-view {
      border-top: 1px solid #1a1a2e; max-height: 50%; overflow-y: auto;
      padding: 12px 16px; font-size: 13px; white-space: pre-wrap; display: none;
      color: #999; background: #08080d;
    }
    #artifact-view.visible { display: block; }

    .empty { padding: 16px; color: #222; font-size: 12px; }

    ::-webkit-scrollbar { width: 6px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: #1a1a2e; border-radius: 3px; }
  </style>
</head>
<body>
  <header>
    <h1>qacky frame</h1>
    <span class="status" id="status"></span>
  </header>
  <main>
    <section id="chat">
      <div id="messages"><div class="empty">waiting...</div></div>
      <form id="chat-form">
        <input id="chat-input" placeholder="say something..." autocomplete="off" autofocus>
        <button type="submit">send</button>
      </form>
    </section>
    <aside id="artifacts">
      <h3>artifacts</h3>
      <div id="artifact-list"><div class="empty">none yet</div></div>
      <div id="artifact-view"></div>
    </aside>
  </main>

  <script>
    const HANDLE = 'robby';
    const POLL_MS = 2000;
    let lastMsgCount = 0;
    let selectedArtifact = null;
    const log = (tag, ...args) => console.log(`%c[${tag}]`, 'color: #6a9fb5; font-weight: bold', ...args);

    const messagesEl = document.getElementById('messages');
    const chatForm = document.getElementById('chat-form');
    const chatInput = document.getElementById('chat-input');
    const artifactListEl = document.getElementById('artifact-list');
    const artifactViewEl = document.getElementById('artifact-view');

    function esc(s) {
      const d = document.createElement('div');
      d.textContent = s;
      return d.innerHTML;
    }

    // --- Chat ---

    async function fetchMessages() {
      try {
        const res = await fetch('/api/chat?count=200');
        const msgs = await res.json();
        if (msgs.length !== lastMsgCount) {
          const newMsgs = msgs.slice(lastMsgCount);
          for (const m of newMsgs) {
            log('chat', `${m.handle}: ${m.text}`);
          }
          renderMessages(msgs);
          lastMsgCount = msgs.length;
        }
      } catch (err) { console.warn('[frame] chat poll error', err); }
    }

    function renderMessages(msgs) {
      if (!msgs.length) {
        messagesEl.innerHTML = '<div class="empty">waiting...</div>';
        return;
      }
      const atBottom = messagesEl.scrollTop + messagesEl.clientHeight >= messagesEl.scrollHeight - 30;
      messagesEl.innerHTML = msgs.map(m => {
        const cls = m.handle === 'bloom' ? 'bloom' : m.handle === HANDLE ? 'robby' : 'other';
        const time = new Date(m.ts).toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
        return `<div class="msg ${cls}"><div class="head"><span class="handle">${esc(m.handle)}</span><span class="ts">${time}</span></div><div class="text">${esc(m.text)}</div></div>`;
      }).join('');
      if (atBottom) messagesEl.scrollTop = messagesEl.scrollHeight;
    }

    chatForm.addEventListener('submit', async (e) => {
      e.preventDefault();
      const text = chatInput.value.trim();
      if (!text) return;
      chatInput.value = '';
      try {
        await fetch('/api/chat', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ handle: HANDLE, text }),
        });
        await fetchMessages();
      } catch {}
    });

    // --- Artifacts ---

    async function fetchArtifacts() {
      try {
        const res = await fetch('/api/artifacts');
        const arts = await res.json();
        renderArtifacts(arts);
      } catch {}
    }

    let lastArtCount = 0;
    function renderArtifacts(arts) {
      if (arts.length !== lastArtCount) {
        const newArts = arts.slice(lastArtCount);
        for (const a of newArts) log('artifact', `${a.name} (${a.type})`);
        lastArtCount = arts.length;
      }
      if (!arts.length) {
        artifactListEl.innerHTML = '<div class="empty">none yet</div>';
        return;
      }
      artifactListEl.innerHTML = arts.map(a => {
        const time = new Date(a.ts).toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
        const active = selectedArtifact === a.id ? 'active' : '';
        return `<div class="art-item ${active}" data-id="${a.id}"><div class="name">${esc(a.name)}</div><div class="meta">${esc(a.type)} · ${time}</div></div>`;
      }).join('');
    }

    artifactListEl.addEventListener('click', async (e) => {
      const item = e.target.closest('.art-item');
      if (!item) return;
      const id = item.dataset.id;
      if (selectedArtifact === id) {
        selectedArtifact = null;
        artifactViewEl.classList.remove('visible');
        artifactViewEl.textContent = '';
        fetchArtifacts();
        return;
      }
      selectedArtifact = id;
      try {
        const res = await fetch(`/api/artifacts/${id}`);
        const art = await res.json();
        artifactViewEl.textContent = art.content;
        artifactViewEl.classList.add('visible');
        fetchArtifacts();
      } catch {}
    });

    // --- Activity feed (chassis events in console) ---

    const ACTIVITY_STYLES = {
      signal:    'color: #ebcb8b; font-weight: bold',
      inference: 'color: #555; font-style: italic',
      thinking:  'color: #888',
      tool:      'color: #b48ead',
      tool_ok:   'color: #a3be8c',
      tool_err:  'color: #bf616a; font-weight: bold',
      done:      'color: #6a9fb5; font-weight: bold',
    };
    let lastActivityTs = 0;

    async function fetchActivity() {
      try {
        const res = await fetch(`/api/activity?after=${lastActivityTs}`);
        const events = await res.json();
        for (const e of events) {
          const style = ACTIVITY_STYLES[e.type] || 'color: #666';
          console.log(`%c[${e.type}]`, style, e.detail);
          lastActivityTs = Math.max(lastActivityTs, e.ts);
        }
      } catch {}
    }

    // --- Poll ---
    fetchMessages();
    fetchArtifacts();
    fetchActivity();
    setInterval(fetchMessages, POLL_MS);
    setInterval(fetchArtifacts, POLL_MS * 3);
    setInterval(fetchActivity, 1000);
  </script>
</body>
</html>
