<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Wheelman</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #0a0a1a;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      font-family: monospace;
    }
    canvas {
      image-rendering: pixelated;
      image-rendering: crisp-edges;
    }
    #build-tag {
      position: fixed;
      bottom: 4px;
      right: 8px;
      color: #333;
      font-size: 10px;
      font-family: monospace;
    }
  </style>
</head>
<body>
  <canvas id="game-canvas" width="960" height="720"></canvas>
  <div id="build-tag"></div>
  <script>document.getElementById('build-tag').textContent = 'b.' + String(Date.now()).slice(-6);</script>
  <script type="module" src="dist/main.js"></script>
</body>
</html>
