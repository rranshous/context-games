<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Once Again: Through the Reach</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;400;600&display=swap');

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    :root {
      --bg: #0a0a0f;
      --bg-subtle: #0f0f18;
      --text: #c8c8d4;
      --text-dim: #6a6a7a;
      --accent: #4fd1c5;
      --accent-dim: #2a7a72;
      --error: #e05555;
      --narration: #8888a0;
      --border: #1a1a2e;
      --input-bg: #0d0d16;
    }

    html, body {
      height: 100%;
      background: var(--bg);
      color: var(--text);
      font-family: 'JetBrains Mono', 'Courier New', monospace;
      font-size: 14px;
      line-height: 1.6;
    }

    #page-layout {
      display: flex;
      height: 100vh;
      width: 100%;
    }

    #game-container {
      display: flex;
      flex-direction: column;
      height: 100vh;
      flex: 1;
      min-width: 0;
      max-width: 800px;
      padding: 0 16px;
    }

    /* ─── Inspector Panel ─── */
    #inspector {
      width: 420px;
      flex-shrink: 0;
      height: 100vh;
      display: flex;
      flex-direction: column;
      border-left: 1px solid var(--border);
      background: var(--bg-subtle);
      font-size: 12px;
      overflow: hidden;
    }

    #inspector.collapsed {
      width: 36px;
    }

    #inspector-header {
      flex-shrink: 0;
      padding: 8px 12px;
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 8px;
    }

    #inspector-header .label {
      color: var(--accent-dim);
      font-size: 11px;
      letter-spacing: 2px;
      text-transform: uppercase;
      white-space: nowrap;
    }

    .collapsed #inspector-header .label,
    .collapsed #inspector-controls {
      display: none;
    }

    #inspector-controls {
      display: flex;
      gap: 6px;
      align-items: center;
    }

    #inspector-controls button {
      background: var(--border);
      border: 1px solid var(--accent-dim);
      color: var(--accent);
      font-family: inherit;
      font-size: 11px;
      padding: 3px 10px;
      cursor: pointer;
      border-radius: 2px;
    }

    #inspector-controls button:hover {
      background: var(--accent-dim);
      color: var(--bg);
    }

    #inspector-controls button.active {
      background: var(--accent);
      color: var(--bg);
      border-color: var(--accent);
    }

    #inspector-toggle {
      background: none;
      border: none;
      color: var(--text-dim);
      font-family: inherit;
      font-size: 14px;
      cursor: pointer;
      padding: 4px;
      flex-shrink: 0;
    }

    #inspector-toggle:hover {
      color: var(--accent);
    }

    #inspector-log {
      flex: 1;
      overflow-y: auto;
      padding: 8px;
    }

    .collapsed #inspector-log {
      display: none;
    }

    #inspector-log::-webkit-scrollbar {
      width: 4px;
    }

    #inspector-log::-webkit-scrollbar-track {
      background: var(--bg-subtle);
    }

    #inspector-log::-webkit-scrollbar-thumb {
      background: var(--border);
      border-radius: 2px;
    }

    .inspector-entry {
      margin-bottom: 12px;
      border: 1px solid var(--border);
      border-radius: 3px;
      overflow: hidden;
    }

    .inspector-entry-header {
      padding: 6px 8px;
      background: var(--bg);
      color: var(--text-dim);
      font-size: 11px;
      cursor: pointer;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .inspector-entry-header:hover {
      color: var(--accent);
    }

    .inspector-entry-header .turn-label {
      color: var(--accent-dim);
      font-weight: 600;
    }

    .inspector-entry-header .command-label {
      color: var(--text);
    }

    .inspector-entry-body {
      display: none;
      padding: 8px;
      font-size: 11px;
      line-height: 1.5;
    }

    .inspector-entry.expanded .inspector-entry-body {
      display: block;
    }

    .inspector-section {
      margin-bottom: 8px;
    }

    .inspector-section-label {
      color: var(--accent-dim);
      font-size: 10px;
      letter-spacing: 1px;
      text-transform: uppercase;
      margin-bottom: 4px;
    }

    .inspector-section-content {
      color: var(--text-dim);
      white-space: pre-wrap;
      word-break: break-word;
      max-height: 200px;
      overflow-y: auto;
      background: var(--bg);
      padding: 6px;
      border-radius: 2px;
      border: 1px solid var(--border);
    }

    .inspector-section-content.prompt {
      color: #b0b0c8;
    }

    .inspector-section-content.response {
      color: var(--accent);
    }

    .inspector-section-content.game-output {
      color: var(--text);
    }

    .inspector-status {
      padding: 8px;
      text-align: center;
      color: var(--text-dim);
      font-style: italic;
    }

    .inspector-status.thinking {
      color: var(--accent);
      animation: pulse 1.5s ease-in-out infinite;
    }

    @keyframes pulse {
      0%, 100% { opacity: 0.4; }
      50% { opacity: 1; }
    }

    #status-bar {
      flex-shrink: 0;
      padding: 8px 12px;
      border-bottom: 1px solid var(--border);
      color: var(--accent-dim);
      font-size: 11px;
      letter-spacing: 2px;
      text-transform: uppercase;
      min-height: 32px;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    #status-bar .title {
      color: var(--accent);
      font-weight: 600;
    }

    #status-bar .info {
      color: var(--text-dim);
    }

    #output {
      flex: 1;
      overflow-y: auto;
      padding: 16px 4px;
      scroll-behavior: smooth;
    }

    #output::-webkit-scrollbar {
      width: 4px;
    }

    #output::-webkit-scrollbar-track {
      background: var(--bg);
    }

    #output::-webkit-scrollbar-thumb {
      background: var(--border);
      border-radius: 2px;
    }

    .output-line {
      margin-bottom: 4px;
      white-space: pre-wrap;
      word-wrap: break-word;
    }

    .output-line.normal {
      color: var(--text);
    }

    .output-line.system {
      color: var(--accent);
      font-weight: 600;
      text-shadow: 0 0 8px rgba(79, 209, 197, 0.15);
    }

    .output-line.error {
      color: var(--error);
    }

    .output-line.narration {
      color: var(--narration);
      font-style: italic;
    }

    .output-line.death {
      color: #cc2222;
      font-weight: 600;
      text-shadow: 0 0 12px rgba(204, 34, 34, 0.3);
    }

    .output-line.echo {
      color: #d4a857;
      border-top: 1px solid #3a3520;
      padding-top: 12px;
      margin-top: 12px;
      font-weight: 600;
    }

    .output-line + .output-line {
      margin-top: 2px;
    }

    .output-break {
      height: 12px;
    }

    #input-area {
      flex-shrink: 0;
      display: flex;
      align-items: center;
      border-top: 1px solid var(--border);
      padding: 12px 0;
    }

    #prompt-char {
      color: var(--accent);
      font-size: 16px;
      font-weight: 600;
      margin-right: 8px;
      user-select: none;
    }

    #input {
      flex: 1;
      background: transparent;
      border: none;
      outline: none;
      color: var(--text);
      font-family: inherit;
      font-size: 14px;
      line-height: 1.6;
      caret-color: var(--accent);
    }

    #input::placeholder {
      color: var(--text-dim);
      opacity: 0.4;
    }

    /* Subtle scanline effect */
    #game-container::before {
      content: '';
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      pointer-events: none;
      background: repeating-linear-gradient(
        0deg,
        transparent,
        transparent 2px,
        rgba(0, 0, 0, 0.03) 2px,
        rgba(0, 0, 0, 0.03) 4px
      );
      z-index: 999;
    }
  </style>
</head>
<body>
  <div id="page-layout">
    <div id="game-container">
      <div id="status-bar">
        <span class="title">THE REACH</span>
        <span class="info" id="status-info">INITIALIZING...</span>
      </div>
      <div id="output"></div>
      <div id="input-area">
        <span id="prompt-char">&gt;</span>
        <input type="text" id="input" placeholder="what do you do?" autocomplete="off" spellcheck="false" autofocus>
      </div>
    </div>
    <div id="inspector">
      <div id="inspector-header">
        <span class="label">Actant Inspector</span>
        <div id="inspector-controls">
          <button id="btn-autoplay">Autoplay</button>
          <button id="btn-step">Step</button>
        </div>
        <button id="inspector-toggle">◀</button>
      </div>
      <div id="inspector-log">
        <div class="inspector-status" id="inspector-status">Idle — press Autoplay or Step</div>
      </div>
    </div>
  </div>
  <script type="module" src="dist/main.js"></script>
</body>
</html>
