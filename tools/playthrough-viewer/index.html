<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Playthrough Viewer</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'Courier New', monospace; background: #1a1a2e; color: #e0e0e0; height: 100vh; display: flex; flex-direction: column; }

    /* Header */
    #header { background: #16213e; padding: 8px 16px; display: flex; align-items: center; gap: 16px; border-bottom: 1px solid #333; flex-shrink: 0; }
    #header h1 { font-size: 14px; color: #7fdbca; white-space: nowrap; }
    #game-info { font-size: 12px; color: #888; }
    #score-display { font-size: 14px; color: #ffd700; margin-left: auto; }

    /* Controls */
    #controls { background: #16213e; padding: 6px 16px; display: flex; align-items: center; gap: 8px; border-bottom: 1px solid #333; flex-shrink: 0; }
    #controls button { background: #2a2a4a; border: 1px solid #555; color: #e0e0e0; padding: 4px 12px; cursor: pointer; font-family: inherit; font-size: 12px; border-radius: 3px; }
    #controls button:hover { background: #3a3a5a; }
    #controls button.active { background: #4a4a7a; border-color: #7fdbca; }
    #step-slider { flex: 1; accent-color: #7fdbca; }
    #step-label { font-size: 12px; color: #aaa; min-width: 80px; }

    /* Main layout */
    #main { display: flex; flex: 1; overflow: hidden; }

    /* Game transcript (left) */
    #transcript-panel { flex: 1; display: flex; flex-direction: column; border-right: 1px solid #333; }
    #transcript-header { padding: 8px 12px; font-size: 11px; color: #7fdbca; text-transform: uppercase; letter-spacing: 1px; border-bottom: 1px solid #222; background: #1e1e3a; }
    #transcript { flex: 1; overflow-y: auto; padding: 12px; }

    .step-block { margin-bottom: 16px; }
    .step-block.future { opacity: 0.15; }
    .step-block.current { border-left: 2px solid #7fdbca; padding-left: 10px; }
    .step-num { font-size: 10px; color: #666; margin-bottom: 2px; }
    .observation { color: #c8c8d0; font-size: 13px; line-height: 1.5; margin-bottom: 6px; white-space: pre-wrap; }
    .tool-call { font-size: 12px; margin: 2px 0; padding: 3px 8px; border-radius: 3px; }
    .tool-call.edit { background: #2a1a3a; color: #c792ea; border-left: 2px solid #c792ea; }
    .tool-call.action { background: #1a2a1a; color: #7fdbca; border-left: 2px solid #7fdbca; }
    .tool-call .tool-name { font-weight: bold; }
    .tool-call .tool-args { color: #aaa; margin-left: 8px; }
    .score-change { font-size: 11px; color: #ffd700; margin-top: 4px; }

    /* Soma panel (right) */
    #soma-panel { width: 420px; display: flex; flex-direction: column; overflow: hidden; flex-shrink: 0; }
    #soma-header { padding: 8px 12px; font-size: 11px; color: #c792ea; text-transform: uppercase; letter-spacing: 1px; border-bottom: 1px solid #222; background: #1e1e3a; }
    #soma { flex: 1; overflow-y: auto; padding: 12px; }

    .soma-section { margin-bottom: 16px; }
    .soma-section-name { font-size: 11px; color: #666; text-transform: uppercase; letter-spacing: 1px; margin-bottom: 4px; display: flex; align-items: center; gap: 6px; }
    .soma-section-name .changed { font-size: 9px; color: #c792ea; background: #2a1a3a; padding: 1px 6px; border-radius: 8px; }
    .soma-section-content { font-size: 12px; line-height: 1.5; color: #c8c8d0; white-space: pre-wrap; background: #16213e; padding: 8px; border-radius: 4px; border: 1px solid #2a2a4a; max-height: 200px; overflow-y: auto; }
    .soma-section-content.history { max-height: 300px; }

    /* Empty state */
    #empty-state { display: flex; align-items: center; justify-content: center; height: 100%; color: #555; font-size: 14px; }
  </style>
</head>
<body>
  <div id="header">
    <h1>Playthrough Viewer</h1>
    <span id="game-info">No playthrough loaded</span>
    <span id="score-display"></span>
  </div>
  <div id="controls">
    <button id="btn-prev">← Prev</button>
    <button id="btn-next">Next →</button>
    <button id="btn-play">▶ Play</button>
    <input type="range" id="step-slider" min="0" max="0" value="0">
    <span id="step-label">Step 0/0</span>
  </div>
  <div id="main">
    <div id="transcript-panel">
      <div id="transcript-header">Game Transcript</div>
      <div id="transcript"><div id="empty-state">Load a playthrough to begin</div></div>
    </div>
    <div id="soma-panel">
      <div id="soma-header">Soma</div>
      <div id="soma"></div>
    </div>
  </div>

  <script>
    let playthrough = null;
    let currentStep = 0;
    let playInterval = null;

    // === PLAYWRIGHT API ===

    window.loadPlaythrough = function(data) {
      if (typeof data === 'string') data = JSON.parse(data);
      playthrough = data;
      currentStep = 0;
      buildTranscript();
      updateView();

      document.getElementById('game-info').textContent =
        `${data.agent} | ${data.env} | ep${data.episode} | ${data.won ? 'WON' : 'lost'} ${data.finalScore}/${data.maxScore}`;
      document.getElementById('step-slider').max = data.steps.length;
      document.getElementById('step-slider').value = 0;
    };

    window.getPlaythrough = function() {
      return playthrough;
    };

    window.goToStep = function(n) {
      if (!playthrough) return;
      currentStep = Math.max(0, Math.min(n, playthrough.steps.length));
      updateView();
    };

    // === BUILD TRANSCRIPT ===

    function buildTranscript() {
      const el = document.getElementById('transcript');
      el.innerHTML = '';

      if (!playthrough || !playthrough.steps.length) {
        el.innerHTML = '<div id="empty-state">No steps recorded</div>';
        return;
      }

      for (const step of playthrough.steps) {
        const block = document.createElement('div');
        block.className = 'step-block';
        block.id = `step-${step.step}`;

        // Step number
        const numEl = document.createElement('div');
        numEl.className = 'step-num';
        numEl.textContent = `Step ${step.step}`;
        block.appendChild(numEl);

        // Observation
        const obsEl = document.createElement('div');
        obsEl.className = 'observation';
        obsEl.textContent = step.observation;
        block.appendChild(obsEl);

        // Tool calls
        for (const tc of step.toolCalls) {
          const tcEl = document.createElement('div');
          const isEdit = tc.name.startsWith('edit_');
          tcEl.className = `tool-call ${isEdit ? 'edit' : 'action'}`;

          if (isEdit) {
            const preview = (tc.args.content ?? '').slice(0, 80).replace(/\n/g, ' ');
            tcEl.innerHTML = `<span class="tool-name">${tc.name}</span><span class="tool-args">${escHtml(preview)}${tc.args.content?.length > 80 ? '...' : ''}</span>`;
          } else {
            tcEl.innerHTML = `<span class="tool-name">→ ${escHtml(tc.args.action ?? '')}</span>`;
          }
          block.appendChild(tcEl);
        }

        // Score
        const prevScore = step.step > 1 ? playthrough.steps[step.step - 2]?.score ?? 0 : 0;
        if (step.score !== prevScore) {
          const scoreEl = document.createElement('div');
          scoreEl.className = 'score-change';
          scoreEl.textContent = `Score: ${prevScore} → ${step.score}`;
          block.appendChild(scoreEl);
        }

        el.appendChild(block);
      }
    }

    // === UPDATE VIEW ===

    function updateView() {
      if (!playthrough) return;

      // Update step label + slider
      document.getElementById('step-label').textContent = `Step ${currentStep}/${playthrough.steps.length}`;
      document.getElementById('step-slider').value = currentStep;

      // Score display
      const score = currentStep > 0 ? playthrough.steps[currentStep - 1].score : 0;
      const max = playthrough.maxScore;
      document.getElementById('score-display').textContent = `Score: ${score}/${max}`;

      // Highlight current step, fade future
      for (const step of playthrough.steps) {
        const el = document.getElementById(`step-${step.step}`);
        if (!el) continue;
        el.className = 'step-block';
        if (step.step === currentStep) {
          el.className += ' current';
        } else if (step.step > currentStep) {
          el.className += ' future';
        }
      }

      // Scroll current step into view
      if (currentStep > 0) {
        const el = document.getElementById(`step-${currentStep}`);
        if (el) el.scrollIntoView({ behavior: 'smooth', block: 'center' });
      }

      // Update soma panel
      updateSoma();
    }

    function updateSoma() {
      const el = document.getElementById('soma');

      if (!playthrough || currentStep === 0) {
        el.innerHTML = '<div style="color:#555;padding:20px;">Step through the game to see soma state</div>';
        return;
      }

      const step = playthrough.steps[currentStep - 1];
      const prevStep = currentStep > 1 ? playthrough.steps[currentStep - 2] : null;
      const soma = step.soma;

      const sections = [
        { name: 'identity', content: soma.identity, prev: prevStep?.soma.identity },
        { name: 'goal', content: soma.goal, prev: prevStep?.soma.goal },
        { name: 'memory', content: soma.memory, prev: prevStep?.soma.memory },
        { name: 'history', content: soma.history.join('\n'), prev: prevStep?.soma.history.join('\n'), isHistory: true },
      ];

      el.innerHTML = sections.map(s => {
        const changed = s.prev !== undefined && s.prev !== s.content;
        return `<div class="soma-section">
          <div class="soma-section-name">${s.name} ${changed ? '<span class="changed">changed</span>' : ''}</div>
          <div class="soma-section-content${s.isHistory ? ' history' : ''}">${escHtml(s.content || '(empty)')}</div>
        </div>`;
      }).join('');
    }

    function escHtml(s) {
      return s.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
    }

    // === CONTROLS ===

    document.getElementById('btn-prev').addEventListener('click', () => {
      if (currentStep > 0) { currentStep--; updateView(); }
    });

    document.getElementById('btn-next').addEventListener('click', () => {
      if (playthrough && currentStep < playthrough.steps.length) { currentStep++; updateView(); }
    });

    document.getElementById('btn-play').addEventListener('click', () => {
      const btn = document.getElementById('btn-play');
      if (playInterval) {
        clearInterval(playInterval);
        playInterval = null;
        btn.textContent = '▶ Play';
        btn.classList.remove('active');
      } else {
        btn.textContent = '⏸ Pause';
        btn.classList.add('active');
        playInterval = setInterval(() => {
          if (!playthrough || currentStep >= playthrough.steps.length) {
            clearInterval(playInterval);
            playInterval = null;
            btn.textContent = '▶ Play';
            btn.classList.remove('active');
            return;
          }
          currentStep++;
          updateView();
        }, 1500);
      }
    });

    document.getElementById('step-slider').addEventListener('input', (e) => {
      currentStep = parseInt(e.target.value);
      updateView();
    });

    // Keyboard shortcuts
    document.addEventListener('keydown', (e) => {
      if (e.key === 'ArrowLeft') { if (currentStep > 0) { currentStep--; updateView(); } }
      if (e.key === 'ArrowRight') { if (playthrough && currentStep < playthrough.steps.length) { currentStep++; updateView(); } }
      if (e.key === ' ') { e.preventDefault(); document.getElementById('btn-play').click(); }
    });
  </script>
</body>
</html>
